<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <meta name="robots" content="noindex,nofollow"/>
        <meta property="og:site_name" content="Elwazer Sports">
        <title>الوزير سبورت - Elwazer Sports | جدول مباريات اليوم والبث المباشر</title>
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
        <style>
            :root {
                --primary: #421480;
                --primary-gradient: linear-gradient(135deg, #2e0d5e 0%, #421480 100%);
                --bg-dark: #070708;
                --card-bg: #111115;
                --border-color: rgba(255, 255, 255, 0.06);
                --text-muted: rgba(255, 255, 255, 0.6);
            }

            * { margin: 0; padding: 0; box-sizing: border-box }
            html, body { scroll-behavior: smooth; }
            body {
                background: var(--bg-dark);
                color: #fff;
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                line-height: 1.6;
                padding-bottom: 40px;
            }

            header {
                background: #0d0d11;
                border-bottom: 1px solid var(--border-color);
                padding: 15px 20px;
                text-align: center;
                position: sticky;
                top: 0;
                z-index: 100;
            }
            header h1 {
                font-size: 20px;
                font-weight: 800;
                background: linear-gradient(90deg, #ff007f, #00ff88);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .container {
                max-width: 1100px;
                margin: 0 auto;
                padding: 15px;
            }

            .live-section {
                display: none;
                margin-bottom: 25px;
                background: #0d0d11;
                border-radius: 12px;
                border: 1px solid var(--border-color);
                overflow: hidden;
                box-shadow: 0 10px 35px rgba(0, 0, 0, 0.5);
                animation: slideDown 0.4s ease-out;
            }

            @keyframes slideDown {
                from { opacity: 0; transform: translateY(-20px); }
                to { opacity: 1; transform: translateY(0); }
            }

            .player-top-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: #07070a;
                padding: 10px 15px;
                border-bottom: 1px solid var(--border-color);
            }
            .player-title {
                font-size: 13px;
                font-weight: bold;
                color: #00ff88;
            }

            .player-control-btn {
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--border-color);
                color: #fff;
                padding: 6px 12px;
                border-radius: 6px;
                cursor: pointer;
                display: inline-flex;
                align-items: center;
                gap: 5px;
                font-size: 11px;
                transition: background 0.2s;
                text-decoration: none;
            }
            .player-control-btn:hover { background: rgba(255, 255, 255, 0.1); }
            .player-control-btn.close-btn {
                background: rgba(255, 59, 48, 0.15);
                border-color: rgba(255, 59, 48, 0.3);
                color: #ff3b30;
                font-weight: bold;
            }
            .player-control-btn.close-btn:hover { background: rgba(255, 59, 48, 0.25); }

            .player-container {
                position: relative;
                width: 100%;
                background: #000;
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 10px;
            }

            .player-wrapper {
                position: relative;
                width: 100%;
                max-width: 120vh;
                aspect-ratio: 16 / 9;
                background: #000;
                border-radius: 8px;
                overflow: hidden;
            }

            #clappr-player { width: 100%; height: 100%; }

            .custom-video-logo {
                position: absolute !important;
                top: 0.1% !important;
                right: 2.1% !important;
                z-index: 999999 !important;
                width: 18% !important;
                aspect-ratio: 1.45 / 1 !important;
                object-fit: fill !important;
                pointer-events: none !important;
                background: transparent !important;
            }

            .player-servers-container {
                background: #0c0c0c;
                border-top: 1px solid var(--border-color);
                padding: 12px 15px;
            }
            .server-label {
                font-size: 11px;
                color: var(--text-muted);
                font-weight: bold;
                margin-bottom: 8px;
            }
            .servers-row {
                display: flex;
                gap: 8px;
                overflow-x: auto;
                scrollbar-width: none;
            }
            .servers-row::-webkit-scrollbar { display: none; }
            .server-tab-btn {
                flex: 1;
                min-width: 90px;
                padding: 8px;
                font-size: 11px;
                font-weight: bold;
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid var(--border-color);
                color: var(--text-muted);
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.25s ease;
                text-align: center;
            }
            .server-tab-btn:hover { background: rgba(255, 255, 255, 0.06); color: #fff; }
            .server-tab-btn.active {
                background: var(--primary-gradient);
                color: #fff;
                border-color: rgba(50, 15, 100, .5);
                box-shadow: 0 2px 10px rgba(46, 13, 94, .3);
            }

            .unmute-overlay {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 9999999 !important;
                background: rgba(10, 10, 10, 0.85);
                border: 1px solid rgba(255, 255, 255, 0.15);
                color: #fff;
                padding: 12px 24px;
                border-radius: 30px;
                font-size: 14px;
                font-weight: bold;
                display: none;
                align-items: center;
                gap: 10px;
                cursor: pointer;
                backdrop-filter: blur(8px);
                box-shadow: 0 10px 25px rgba(0,0,0,0.5);
                animation: pulse 2s infinite;
            }
            .unmute-overlay svg { width: 20px; height: 20px; fill: currentColor; }

            .offline-overlay {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 9999998 !important;
                background: rgba(10, 10, 10, 0.92);
                display: none;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                color: #fff;
                text-align: center;
                padding: 20px;
                backdrop-filter: blur(10px);
            }
            .offline-overlay svg { width: 55px; height: 55px; fill: #ff3b30; margin-bottom: 15px; }

            .date-tabs-container {
                display: flex;
                gap: 12px;
                margin: 20px 0;
                justify-content: center;
                flex-wrap: wrap;
            }
            .date-tab-btn {
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid var(--border-color);
                color: var(--text-muted);
                padding: 10px 20px;
                border-radius: 30px;
                font-size: 12px;
                font-weight: bold;
                cursor: pointer;
                transition: all 0.25s ease;
                white-space: nowrap;
                display: inline-flex;
                align-items: center;
                gap: 6px;
            }
            .date-tab-btn:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
            .date-tab-btn.active {
                background: var(--primary-gradient);
                color: #fff;
                border-color: rgba(50, 15, 100, 0.5);
                box-shadow: 0 4px 15px rgba(46, 13, 94, 0.4);
            }

            .section-title {
                font-size: 16px;
                font-weight: bold;
                margin: 25px 0 15px;
                padding-right: 10px;
                border-right: 3px solid #421480;
                display: flex;
                align-items: center;
                justify-content: space-between;
            }

            .matches-grid {
                display: grid;
                grid-template-columns: 1fr;
                gap: 12px;
                min-height: 200px;
            }
            @media (min-width: 768px) {
                .matches-grid { grid-template-columns: 1fr 1fr; }
            }

            .match-card {
                background: var(--card-bg);
                border: 1px solid var(--border-color);
                border-radius: 12px;
                padding: 15px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                cursor: pointer;
                transition: transform 0.2s, border-color 0.2s;
            }
            .match-card:hover {
                transform: translateY(-2px);
                border-color: rgba(66, 20, 128, 0.4);
            }

            .match-league {
                font-size: 11px;
                color: var(--text-muted);
                font-weight: bold;
                margin-bottom: 10px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .match-status {
                padding: 2px 8px;
                border-radius: 10px;
                font-size: 10px;
                font-weight: bold;
            }
            .status-live { background: rgba(255, 0, 127, 0.15); color: #00ff88; animation: blink 1.5s infinite; }
            .status-waiting { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); }
            .status-ended { background: rgba(255, 255, 255, 0.08); color: var(--text-muted); }

            @keyframes blink { 50% { opacity: 0.5; } }

            .match-teams {
                display: flex;
                align-items: center;
                justify-content: space-between;
                margin: 10px 0;
            }
            .team-col {
                flex: 1;
                display: flex;
                flex-direction: column;
                align-items: center;
                text-align: center;
                gap: 8px;
            }
            .team-logo { width: 45px; height: 45px; object-fit: contain; }
            .team-name { font-size: 13px; font-weight: bold; }

            .match-time-info {
                text-align: center;
                font-size: 11px;
                color: var(--text-muted);
                min-width: 90px;
            }
            .match-time { font-size: 15px; font-weight: bold; color: #fff; margin-bottom: 3px; }

            .match-score-live { font-size: 20px; font-weight: 800; color: #00ff88; letter-spacing: 2px; }
            .match-score-final { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: 2px; }
            .match-minute-badge {
                background: rgba(0, 255, 136, 0.15);
                color: #00ff88;
                padding: 2px 6px;
                border-radius: 4px;
                font-size: 10px;
                font-weight: bold;
                margin-top: 4px;
                display: inline-block;
            }
            .match-status-ended { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

            .match-meta {
                border-top: 1px solid rgba(255,255,255,0.03);
                padding-top: 8px;
                margin-top: 10px;
                display: flex;
                justify-content: space-between;
                font-size: 11px;
                color: var(--text-muted);
            }

            .btn-watch {
                display: block;
                width: 100%;
                text-align: center;
                background: var(--primary-gradient);
                color: #fff;
                text-decoration: none;
                padding: 10px;
                border-radius: 8px;
                font-size: 12px;
                font-weight: bold;
                margin-top: 12px;
                border: none;
                cursor: pointer;
                transition: opacity 0.2s;
            }
            .btn-watch:hover { opacity: 0.9; }

            .empty-state {
                grid-column: 1 / -1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 40px 20px;
                border-radius: 12px;
                border: 1px dashed var(--border-color);
                color: var(--text-muted);
                font-size: 13px;
                background: #0b0b0e;
            }

            /* شاشة التحميل */
            .loading-state {
                grid-column: 1 / -1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 40px 20px;
                color: var(--text-muted);
                font-size: 13px;
                gap: 12px;
            }
            .loading-spinner {
                width: 32px;
                height: 32px;
                border: 3px solid rgba(255,255,255,0.1);
                border-top-color: #421480;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }
            @keyframes spin { to { transform: rotate(360deg); } }

            @media (max-width: 768px) {
                .custom-video-logo { right: 2.1% !important; top: 0.1% !important; width: 18% !important; }
            }
        </style>
    </head>
    <body>

        <header>
            <h1>الوزير سبورت - Elwazer Sports</h1>
        </header>

        <div class="container">

            <!-- قسم مشغل البث -->
            <div id="live-section" class="live-section">
                <div class="player-top-bar">
                    <span class="player-title" id="player-status-title">📡 بث حي ومباشر الآن</span>
                    <button class="player-control-btn close-btn" onclick="closeLiveSection()">
                        ❌ إغلاق البث والرجوع للرئيسية
                    </button>
                </div>

                <div class="player-container">
                    <div class="player-wrapper">

                        <div id="clappr-player"></div>

                        <img src="logo.png" class="custom-video-logo" id="custom-logo" alt="Logo">

                        <div id="offline-overlay" class="offline-overlay">
                            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                            <div style="font-size: 18px; font-weight: bold; margin-bottom: 8px;">البث متوقف مؤقتاً</div>
                            <div style="font-size: 13px; color: rgba(255,255,255,0.6); max-width: 320px; line-height: 1.5;">هذه القناة غير مضافة حالياً أو أن البث متوقف مؤقتاً. يرجى تجربة السيرفرات الأخرى.</div>
                        </div>

                        <div id="unmute-overlay" class="unmute-overlay" onclick="unmutePlayer()">
                            <svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM19 12c0 3.28-2.16 6.07-5.14 7.03c1.92-.61 3.44-2.13 4.05-4.05C18.42 13.93 19 12.82 19 12zm-8.81 7.19L5.35 14H2v-4h3.35l4.84-5.19C10.74 4.26 11.5 4.61 11.5 5.3v13.4c0 .69-.76 1.04-1.31.49z"/></svg>
                            إلغاء الكتم وتفعيل الصوت
                        </div>

                    </div>
                </div>

                <div class="player-servers-container">
                    <div class="server-label">📺 اختر سيرفر البث الخاص بك لتشغيل اللقاء:</div>
                    <div class="servers-row" id="servers-row">
                        <button class="server-tab-btn active" data-index="0">Server 1</button>
                        <button class="server-tab-btn" data-index="1">Server 2</button>
                        <button class="server-tab-btn" data-index="2">Server 3</button>
                        <button class="server-tab-btn" data-index="3">Server 4</button>
                    </div>
                </div>
            </div>

            <!-- جدول المباريات -->
            <div class="section-title">
                <span>📅 جدول مباريات اليوم</span>
                <button class="player-control-btn" onclick="loadMatchesFromYSscores()" style="padding: 4px 10px; font-size: 10px;">
                    🔄 تحديث جدول المباريات
                </button>
            </div>

            <div class="date-tabs-container">
                <button class="date-tab-btn" id="date-btn-yesterday" onclick="changeDateOffset(-1, this)">⬅️ مباريات الأمس</button>
                <button class="date-tab-btn active" id="date-btn-today" onclick="changeDateOffset(0, this)">📅 مباريات اليوم</button>
                <button class="date-tab-btn" id="date-btn-tomorrow" onclick="changeDateOffset(1, this)">مباريات الغد ➡️</button>
            </div>

            <div class="matches-grid" id="matches-container">
                <div class="loading-state">
                    <div class="loading-spinner"></div>
                    <span>جاري تحميل المباريات...</span>
                </div>
            </div>

        </div>

        <script>
            // ============================================================
            // المتغيرات العامة
            // ============================================================
            var player = null;
            var currentPlayingUrl = "";
            var activeDateOffset = 0;
            var matchesData = [];          // FIX 3: تخزين المباريات هنا بدل JSON في onclick
            var currentStreams = [];        // FIX 5: روابط السيرفرات الخاصة بالمباراة الحالية

            // ============================================================
            // تاريخ
            // ============================================================
            function getFormattedDate(offset) {
                var d = new Date();
                d.setDate(d.getDate() + offset);
                return String(d.getDate()).padStart(2,'0') + '-' +
                       String(d.getMonth()+1).padStart(2,'0') + '-' +
                       d.getFullYear();
            }

            function getOffsetDateString(offset) {
                var d = new Date();
                d.setDate(d.getDate() + offset);
                return d.getFullYear() + '-' +
                       String(d.getMonth()+1).padStart(2,'0') + '-' +
                       String(d.getDate()).padStart(2,'0');
            }

            function changeDateOffset(offset, element) {
                activeDateOffset = offset;
                document.querySelectorAll('.date-tab-btn').forEach(function(btn) {
                    btn.classList.remove('active');
                });
                element.classList.add('active');
                loadMatchesFromYSscores();
            }

            // ============================================================
            // FIX 1: سحب المباريات — بروكسيات محسّنة مع فحص صحة المحتوى
            // ============================================================
            async function loadMatchesFromYSscores() {
                // عرض شاشة التحميل
                var container = document.getElementById('matches-container');
                container.innerHTML = '<div class="loading-state"><div class="loading-spinner"></div><span>جاري تحميل المباريات...</span></div>';

                var dateString = getOffsetDateString(activeDateOffset);

                // روابط المصدر
                var targetUrls = activeDateOffset === 0
                    ? ['https://www.ysscores.com/en/', 'https://www.ysscores.com/']
                    : ['https://www.ysscores.com/en/?date=' + dateString,
                       'https://www.ysscores.com/?date=' + dateString];

                // FIX 1: قائمة بروكسيات محدّثة مع thingproxy أولاً
                var proxies = [
                    { url: 'https://thingproxy.freeboard.io/fetch/', type: 'text' },
                    { url: 'https://api.allorigins.win/get?url=',    type: 'json' },
                    { url: 'https://corsproxy.io/?url=',             type: 'text' },
                    { url: 'https://api.codetabs.com/v1/proxy?quest=', type: 'text' }
                ];

                var htmlContent = "";
                var success = false;

                outerLoop:
                for (var u = 0; u < targetUrls.length; u++) {
                    var urlToFetch = targetUrls[u];
                    for (var p = 0; p < proxies.length; p++) {
                        try {
                            var proxyUrl = proxies[p].url + encodeURIComponent(urlToFetch);
                            var response = await fetch(proxyUrl, { signal: AbortSignal.timeout(10000) });
                            if (!response.ok) continue;

                            var rawText;
                            if (proxies[p].type === 'json') {
                                var json = await response.json();
                                rawText = json.contents || "";
                            } else {
                                rawText = await response.text();
                            }

                            // FIX 1: فحص صحة المحتوى — لازم يكون HTML حقيقي من YSscores
                            if (rawText && rawText.includes('<html') && rawText.length > 2000) {
                                htmlContent = rawText;
                                success = true;
                                break outerLoop;
                            }
                        } catch (e) {
                            console.warn('proxy ' + (p+1) + ' failed for url ' + (u+1) + ':', e.message);
                        }
                    }
                }

                if (!success) {
                    renderMatches([]);
                    return;
                }

                try {
                    var parser = new DOMParser();
                    var doc = parser.parseFromString(htmlContent, 'text/html');
                    var matchesList = [];

                    // --------------------------------------------------------
                    // المسار الأول: Next.js __NEXT_DATA__ (FIX 2: محسّن)
                    // --------------------------------------------------------
                    var nextDataEl = doc.getElementById('__NEXT_DATA__');
                    if (nextDataEl) {
                        try {
                            var jsonData = JSON.parse(nextDataEl.textContent);
                            var rawMatches = findMatchesArray(jsonData, 0);

                            if (rawMatches && rawMatches.length > 0) {
                                rawMatches.forEach(function(item, index) {
                                    var league = extractStr(item, [
                                        'championship_name_en','championship_name',
                                        ['championship','name_en'], ['championship','name']
                                    ]) || "International Match";

                                    var nameA = extractStr(item, [
                                        'home_team_name_en','home_team_name',
                                        ['home_team','name_en'], ['home_team','name']
                                    ]) || "Team A";

                                    var nameB = extractStr(item, [
                                        'away_team_name_en','away_team_name',
                                        ['away_team','name_en'], ['away_team','name']
                                    ]) || "Team B";

                                    var logoA = extractStr(item, [
                                        'home_team_logo', ['home_team','logo']
                                    ]) || "https://placehold.co/45";

                                    var logoB = extractStr(item, [
                                        'away_team_logo', ['away_team','logo']
                                    ]) || "https://placehold.co/45";

                                    if (logoA.startsWith('/')) logoA = 'https://www.ysscores.com' + logoA;
                                    if (logoB.startsWith('/')) logoB = 'https://www.ysscores.com' + logoB;

                                    var time = item.time || item.match_time || "00:00";

                                    var scoreA = item.home_score !== undefined ? item.home_score :
                                                 item.home_team_score !== undefined ? item.home_team_score : "";
                                    var scoreB = item.away_score !== undefined ? item.away_score :
                                                 item.away_team_score !== undefined ? item.away_team_score : "";
                                    var minute = item.minute || item.match_minute || "";

                                    var status = "waiting";
                                    var s = (item.status || item.status_name || "").toLowerCase();
                                    if (s === 'live' || s === 'playing' || item.is_live) {
                                        status = "live";
                                    } else if (s === 'finished' || s === 'ended' || s === 'ft' || s === 'ht') {
                                        status = "ended";
                                    }

                                    var channel = "beIN Sports";
                                    if (item.channels && item.channels.length > 0) {
                                        channel = item.channels[0].name_en || item.channels[0].name || channel;
                                    } else if (item.tv_channels) {
                                        channel = item.tv_channels;
                                    }

                                    var matchSlug = item.slug || item.id || "";
                                    var matchUrl = matchSlug ? 'https://www.ysscores.com/en/match/' + matchSlug : "";

                                    // روابط البث لو موجودة في API
                                    var streams = [];
                                    if (item.streams && Array.isArray(item.streams)) {
                                        streams = item.streams.map(function(s) { return s.url || s.link || '#'; });
                                    }

                                    matchesList.push({
                                        id: index + 1,
                                        league: league,
                                        status: status,
                                        teamA: { name: nameA, logo: logoA },
                                        teamB: { name: nameB, logo: logoB },
                                        time: time,
                                        scoreA: scoreA,
                                        scoreB: scoreB,
                                        minute: minute,
                                        channel: channel,
                                        matchUrl: matchUrl,
                                        streams: streams
                                    });
                                });
                            }
                        } catch (e) {
                            console.warn("Next.js parsing failed, falling back to DOM:", e);
                        }
                    }

                    // --------------------------------------------------------
                    // المسار الثاني: DOM Fallback (FIX 4: قراءة أسماء صحيحة)
                    // --------------------------------------------------------
                    if (matchesList.length === 0) {
                        var matchBoxes = doc.querySelectorAll('a[href*="/match/"], [class*="match-card"], [class*="match_card"], .match-row');

                        matchBoxes.forEach(function(el, index) {
                            var imgs = el.querySelectorAll('img');
                            var logoA = "https://placehold.co/45";
                            var logoB = "https://placehold.co/45";
                            var nameA = "Team A";
                            var nameB = "Team B";

                            if (imgs.length >= 2) {
                                // FIX 4: اجلب الاسم من alt أو title أولاً — أضمن بكثير
                                logoA = imgs[0].src || logoA;
                                logoB = imgs[1].src || logoB;

                                nameA = (imgs[0].getAttribute('alt') || '').trim() ||
                                        (imgs[0].getAttribute('title') || '').trim();
                                nameB = (imgs[1].getAttribute('alt') || '').trim() ||
                                        (imgs[1].getAttribute('title') || '').trim();

                                // fallback: أقرب span/p فاضي من أولاد مباشرين
                                if (!nameA) {
                                    var pA = imgs[0].closest('[class*="team"]') || imgs[0].parentElement;
                                    if (pA) {
                                        pA.querySelectorAll('span, p').forEach(function(node) {
                                            if (!nameA && node.children.length === 0) {
                                                var t = node.textContent.replace(/\d/g,'').trim();
                                                if (t.length > 1) nameA = t;
                                            }
                                        });
                                    }
                                }
                                if (!nameB) {
                                    var pB = imgs[1].closest('[class*="team"]') || imgs[1].parentElement;
                                    if (pB) {
                                        pB.querySelectorAll('span, p').forEach(function(node) {
                                            if (!nameB && node.children.length === 0) {
                                                var t = node.textContent.replace(/\d/g,'').trim();
                                                if (t.length > 1) nameB = t;
                                            }
                                        });
                                    }
                                }

                                nameA = nameA || "Team A";
                                nameB = nameB || "Team B";
                            }

                            if (logoA.startsWith('/')) logoA = 'https://www.ysscores.com' + logoA;
                            if (logoB.startsWith('/')) logoB = 'https://www.ysscores.com' + logoB;

                            // سحب البطولة
                            var league = "International Match";
                            var headerSearch = el;
                            while (headerSearch && headerSearch !== doc.body) {
                                var prev = headerSearch.previousElementSibling;
                                while (prev) {
                                    if (/h[2-4]|title|header/i.test(prev.tagName + prev.className)) {
                                        var t = prev.textContent.trim();
                                        if (t.length > 3) { league = t; break; }
                                    }
                                    prev = prev.previousElementSibling;
                                }
                                if (league !== "International Match") break;
                                headerSearch = headerSearch.parentElement;
                            }
                            league = league.replace(/\s+/g,' ').trim();

                            // الوقت
                            var time = "00:00";
                            var timeEl = el.querySelector('.match-time, [class*="time"]');
                            if (timeEl) {
                                time = timeEl.textContent.trim();
                            } else {
                                var tm = el.textContent.match(/\d{1,2}:\d{2}/);
                                if (tm) time = tm[0];
                            }

                            // النتيجة
                            var scoreA = "", scoreB = "";
                            var scoreMatch = el.textContent.match(/(\d+)\s*-\s*(\d+)/);
                            if (scoreMatch) { scoreA = scoreMatch[1]; scoreB = scoreMatch[2]; }

                            // الحالة
                            var status = "waiting";
                            var txt = el.textContent.toLowerCase();
                            if (txt.includes("live") || txt.includes("playing") || txt.includes(" min") || el.querySelector('[class*="live"]')) {
                                status = "live";
                            } else if (txt.includes("ended") || txt.includes("finished") || /\bft\b|\bht\b/.test(txt)) {
                                status = "ended";
                            }

                            // القناة
                            var channel = "beIN Sports";
                            el.querySelectorAll('span, div').forEach(function(node) {
                                if (node.children.length === 0) {
                                    var t = node.textContent.trim();
                                    if (/bein|sport|tv|channel/i.test(t) && t.length < 40) channel = t;
                                }
                            });

                            matchesList.push({
                                id: index + 1,
                                league: league,
                                status: status,
                                teamA: { name: nameA, logo: logoA },
                                teamB: { name: nameB, logo: logoB },
                                time: time,
                                scoreA: scoreA,
                                scoreB: scoreB,
                                minute: "",
                                channel: channel,
                                matchUrl: el.href || "",
                                streams: []
                            });
                        });
                    }

                    renderMatches(matchesList);

                } catch (err) {
                    console.error("Error processing matches:", err);
                    renderMatches([]);
                }
            }

            // ============================================================
            // FIX 2: findMatchesArray — بحث محسّن مع عمق محدود وأولويات
            // ============================================================
            function findMatchesArray(obj, depth) {
                if (depth > 8 || !obj || typeof obj !== 'object') return null;

                if (Array.isArray(obj) && obj.length > 0) {
                    var first = obj[0];
                    if (first && typeof first === 'object') {
                        var hasHome = 'home_team' in first || 'home_team_name' in first ||
                                      'homeTeam' in first || 'home_team_name_en' in first;
                        var hasAway = 'away_team' in first || 'away_team_name' in first ||
                                      'awayTeam' in first || 'away_team_name_en' in first;
                        if (hasHome && hasAway) return obj;
                    }
                }

                // الأولوية للمفاتيح الشائعة في YSscores / Next.js
                var priorityKeys = ['matches','fixtures','events','data','props','pageProps','initialData','dehydratedState'];
                for (var i = 0; i < priorityKeys.length; i++) {
                    var k = priorityKeys[i];
                    if (obj[k]) {
                        var res = findMatchesArray(obj[k], depth + 1);
                        if (res) return res;
                    }
                }

                // باقي المفاتيح
                for (var key in obj) {
                    if (obj.hasOwnProperty(key) && !priorityKeys.includes(key)) {
                        var res2 = findMatchesArray(obj[key], depth + 1);
                        if (res2) return res2;
                    }
                }
                return null;
            }

            // دالة مساعدة لاستخراج قيمة من مسارات متعددة
            function extractStr(obj, paths) {
                for (var i = 0; i < paths.length; i++) {
                    var path = paths[i];
                    if (typeof path === 'string') {
                        if (obj[path]) return String(obj[path]);
                    } else if (Array.isArray(path)) {
                        var val = obj;
                        for (var j = 0; j < path.length; j++) {
                            val = val && val[path[j]];
                        }
                        if (val) return String(val);
                    }
                }
                return null;
            }

            // ============================================================
            // عرض الكروت — FIX 3: استخدام index بدل JSON في onclick
            // ============================================================
            function renderMatches(list) {
                matchesData = list;   // حفظ المباريات عالمياً
                var container = document.getElementById('matches-container');
                container.innerHTML = "";

                if (list.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            📡 لا توجد مباريات لهذا اليوم، أو أن خوادم YSscores محجوبة مؤقتاً.
                            <button class="player-control-btn" onclick="loadMatchesFromYSscores()" style="margin-top: 15px; background: var(--primary-gradient);">🔄 إعادة المحاولة</button>
                        </div>
                    `;
                    return;
                }

                list.forEach(function(match, index) {
                    var statusClass = 'status-waiting';
                    var statusText = 'لم تبدأ';
                    if (match.status === 'live') { statusClass = 'status-live'; statusText = '● مباشر الآن'; }
                    else if (match.status === 'ended') { statusClass = 'status-ended'; statusText = 'انتهت'; }

                    var centerHtml = "";
                    if (match.status === 'live') {
                        centerHtml = `
                            <div class="match-time-info">
                                <div class="match-score-live">${escHtml(String(match.scoreA))} - ${escHtml(String(match.scoreB))}</div>
                                <div class="match-minute-badge">🔥 دقيقة ${escHtml(String(match.minute || 'الآن'))}</div>
                            </div>`;
                    } else if (match.status === 'ended') {
                        centerHtml = `
                            <div class="match-time-info">
                                <div class="match-score-final">${escHtml(String(match.scoreA))} - ${escHtml(String(match.scoreB))}</div>
                                <div class="match-status-ended">انتهت المباراة</div>
                            </div>`;
                    } else {
                        centerHtml = `
                            <div class="match-time-info">
                                <div class="match-time">${escHtml(String(match.time))}</div>
                                <span>توقيت اللقاء</span>
                            </div>`;
                    }

                    var btnText = match.status === 'live' ? 'شاهد البث المباشر 📡' : 'تفاصيل المباراة 📊';

                    // FIX 3: استخدام index رقم فقط في onclick — آمن 100% من مشاكل escaping
                    container.innerHTML += `
                        <div class="match-card" onclick="selectMatch(${index})">
                            <div class="match-league">
                                <span>🏆 ${escHtml(match.league)}</span>
                                <span class="match-status ${statusClass}">${statusText}</span>
                            </div>
                            <div class="match-teams">
                                <div class="team-col">
                                    <img class="team-logo" src="${escHtml(match.teamA.logo)}" alt="${escHtml(match.teamA.name)}" onerror="this.src='https://placehold.co/45'">
                                    <span class="team-name">${escHtml(match.teamA.name)}</span>
                                </div>
                                ${centerHtml}
                                <div class="team-col">
                                    <img class="team-logo" src="${escHtml(match.teamB.logo)}" alt="${escHtml(match.teamB.name)}" onerror="this.src='https://placehold.co/45'">
                                    <span class="team-name">${escHtml(match.teamB.name)}</span>
                                </div>
                            </div>
                            <div class="match-meta">
                                <span>📺 ${escHtml(match.channel)}</span>
                            </div>
                            <button class="btn-watch">${btnText}</button>
                        </div>
                    `;
                });
            }

            // دالة escape للـ HTML — تمنع XSS وتصلح مشاكل الاقتباسات
            function escHtml(str) {
                return String(str)
                    .replace(/&/g,'&amp;')
                    .replace(/</g,'&lt;')
                    .replace(/>/g,'&gt;')
                    .replace(/"/g,'&quot;')
                    .replace(/'/g,'&#39;');
            }

            // ============================================================
            // FIX 3 + FIX 5: selectMatch يستخدم index ويضبط السيرفرات
            // ============================================================
            function selectMatch(index) {
                var match = matchesData[index];
                if (!match) return;

                var liveSection = document.getElementById('live-section');
                liveSection.style.display = 'block';
                liveSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

                document.getElementById('player-status-title').innerText =
                    '📡 مباراة: ' + match.teamA.name + ' ضد ' + match.teamB.name;

                // FIX 5: روابط السيرفرات — لو المباراة عندها روابط استخدمها، غير كدا الافتراضية
                currentStreams = (match.streams && match.streams.length > 0)
                    ? match.streams
                    : [
                        "https://live.kooran53.cfd/goolato3_480/index.m3u8",
                        "https://2cup.s3.us-east-2.amazonaws.com/max2/max2_720p/index.m3u8",
                        "#",
                        "#"
                      ];

                // تفعيل السيرفر الأول وربط أزرار السيرفرات بالروابط الصحيحة
                var serverBtns = document.querySelectorAll('.server-tab-btn');
                serverBtns.forEach(function(btn) { btn.classList.remove('active'); });
                serverBtns[0] && serverBtns[0].classList.add('active');

                loadStream(currentStreams[0] || '#');
            }

            // ============================================================
            // تبديل السيرفر — FIX 5: يقرأ من currentStreams
            // ============================================================
            document.getElementById('servers-row').addEventListener('click', function(e) {
                var btn = e.target.closest('.server-tab-btn');
                if (!btn) return;
                var idx = parseInt(btn.getAttribute('data-index'), 10);
                document.querySelectorAll('.server-tab-btn').forEach(function(b) { b.classList.remove('active'); });
                btn.classList.add('active');
                loadStream(currentStreams[idx] || '#');
            });

            // ============================================================
            // تحميل البث في Clappr
            // ============================================================
            function loadStream(url) {
                currentPlayingUrl = url;
                var offlineOverlay = document.getElementById('offline-overlay');
                var unmuteOverlay  = document.getElementById('unmute-overlay');

                if (player) { player.destroy(); player = null; }

                if (!url || url === '#' || url === '') {
                    offlineOverlay.style.display = 'flex';
                    unmuteOverlay.style.display = 'none';
                    return;
                }

                offlineOverlay.style.display = 'none';

                player = new Clappr.Player({
                    source: url,
                    parentId: '#clappr-player',
                    width: '100%',
                    height: '100%',
                    autoPlay: true,
                    mute: true,
                    preload: 'auto',
                    stretching: 'exactfit',
                    playback: {
                        playInline: true,
                        recycleVideo: true,
                        hlsjsConfig: {
                            enableWorker: true,
                            lowLatencyMode: true,
                            maxBufferLength: 12,
                            liveBackBufferLength: 0,
                            manifestLoadingMaxRetry: 10,
                            levelLoadingMaxRetry: 10
                        }
                    }
                });

                player.on(Clappr.Events.PLAYER_READY, function() {
                    injectOverlays();
                    player.unmute();
                    setTimeout(function() {
                        if (player && player.getVolume() === 0) {
                            document.getElementById('unmute-overlay').style.display = 'flex';
                        }
                    }, 700);
                });

                player.on(Clappr.Events.CORE_CONTAINERS_CREATED, function() { injectOverlays(); });

                player.on(Clappr.Events.PLAYER_PLAY, function() {
                    document.getElementById('offline-overlay').style.display = 'none';
                });

                player.on(Clappr.Events.CORE_FULLSCREEN, function(isFullscreen) {
                    var logo = document.getElementById('custom-logo');
                    if (logo) logo.style.setProperty('right', isFullscreen ? '4.5%' : '2.1%', 'important');
                });

                player.on(Clappr.Events.PLAYER_ERROR, function() {
                    offlineOverlay.style.display = 'flex';
                    unmuteOverlay.style.display = 'none';
                    setTimeout(function() {
                        if (currentPlayingUrl && currentPlayingUrl !== '#' && player) {
                            player.load(currentPlayingUrl);
                            player.play();
                        }
                    }, 5000);
                });
            }

            function closeLiveSection() {
                document.getElementById('live-section').style.display = 'none';
                if (player) { player.destroy(); player = null; }
                document.getElementById('matches-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            function unmutePlayer() {
                if (player) { player.unmute(); player.setVolume(100); }
                document.getElementById('unmute-overlay').style.display = 'none';
            }

            document.body.addEventListener('click', function() {
                if (document.getElementById('unmute-overlay').style.display === 'flex') unmutePlayer();
            }, { once: true });

            function injectOverlays() {
                if (player && player.core && player.core.el) {
                    var c = player.core.el;
                    ['custom-logo','unmute-overlay','offline-overlay'].forEach(function(id) {
                        var el = document.getElementById(id);
                        if (el && el.parentElement !== c) c.appendChild(el);
                    });
                }
            }

            // ============================================================
            // تشغيل عند التحميل
            // ============================================================
            document.addEventListener("DOMContentLoaded", function() {
                document.getElementById('date-btn-yesterday').innerHTML = '⬅️ الأمس (' + getFormattedDate(-1) + ')';
                document.getElementById('date-btn-today').innerHTML     = '📅 اليوم (' + getFormattedDate(0)  + ')';
                document.getElementById('date-btn-tomorrow').innerHTML  = 'الغد (' + getFormattedDate(1)  + ') ➡️';
                loadMatchesFromYSscores();
            });

            // تحديث صامت كل 60 ثانية
            setInterval(function() { loadMatchesFromYSscores(); }, 60000);
        </script>
    </body>
</html>
