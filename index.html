<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <meta name="robots" content="noindex,nofollow"/>
    <title>Elwazer Sports - Live Match</title>
    <script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
    <style>
        :root {
            --primary: #421480;
            --primary-dark: #2e0d5e;
            --accent: #00ff88;
            --bg: #070708;
            --surface: #0f0f13;
            --surface2: #16161c;
            --border: rgba(255,255,255,0.06);
            --text: #ffffff;
            --text-muted: rgba(255,255,255,0.55);
        }

        * { margin:0; padding:0; box-sizing:border-box }
        html, body {
            height: 100%; width: 100%;
            background: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* ===== HEADER ===== */
        .header {
            flex-shrink: 0;
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 8px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
        }
        .header-logo {
            font-size: 15px;
            font-weight: 800;
            background: linear-gradient(90deg, #ff007f, #00ff88);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }
        .match-badge {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.04);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 6px 14px;
            flex: 1;
            max-width: 520px;
            overflow: hidden;
        }
        .match-badge .live-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent);
            flex-shrink: 0;
            animation: blink 1.4s infinite;
        }
        @keyframes blink { 50% { opacity: 0.2; } }
        .match-badge .badge-teams {
            font-size: 13px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .match-badge .badge-time {
            font-size: 11px;
            color: var(--accent);
            white-space: nowrap;
            margin-right: auto;
        }
        .match-badge .badge-league {
            font-size: 10px;
            color: var(--text-muted);
            white-space: nowrap;
        }

        /* ===== CHANNELS BAR ===== */
        .channels-bar {
            flex-shrink: 0;
            background: var(--surface2);
            border-bottom: 1px solid var(--border);
            padding: 8px 10px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: thin;
            scrollbar-color: rgba(66,20,128,0.5) transparent;
        }
        .channels-bar::-webkit-scrollbar { height: 3px; }
        .channels-bar::-webkit-scrollbar-thumb {
            background: rgba(66,20,128,0.5);
            border-radius: 3px;
        }

        /* ===== بطاقة القناة - أفقية ومتناسقة ===== */
        .channel-card {
            flex-shrink: 0;
            width: 230px;
            background: rgba(255,255,255,0.03);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 10px 13px;
            cursor: pointer;
            transition: all 0.22s ease;
            display: flex;
            flex-direction: column;
            gap: 7px;
        }
        .channel-card:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(255,255,255,0.13);
            transform: translateY(-1px);
        }
        .channel-card.active {
            background: linear-gradient(145deg, var(--primary-dark), var(--primary));
            border-color: rgba(120,60,220,0.6);
            box-shadow: 0 3px 16px rgba(66,20,128,0.4);
        }

        /* صف العنوان: اسم السيرفر + الحالة */
        .ch-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 6px;
        }
        .ch-name {
            font-size: 13px;
            font-weight: 800;
            color: #fff;
        }
        .ch-status {
            font-size: 10px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .ch-status.live {
            background: rgba(0,255,136,0.15);
            color: var(--accent);
            animation: blink 1.4s infinite;
        }
        .ch-status.soon {
            background: rgba(255,200,0,0.12);
            color: #ffcc00;
        }
        .ch-status.ended {
            background: rgba(255,255,255,0.07);
            color: var(--text-muted);
        }

        /* صف الفريقين - في سطر واحد أفقي */
        .ch-teams-inline {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 4px;
        }
        .ch-team-side {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
            min-width: 0;
        }
        .ch-team-side.right { justify-content: flex-end; }
        .ch-team-side .t-flag { font-size: 16px; flex-shrink: 0; }
        .ch-team-side .t-name {
            font-size: 12px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ch-vs-mid {
            font-size: 10px;
            font-weight: 900;
            color: rgba(255,255,255,0.3);
            letter-spacing: 1px;
            flex-shrink: 0;
            padding: 0 4px;
        }

        /* النتيجة */
        .ch-score {
            text-align: center;
            font-size: 18px;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: 3px;
            line-height: 1;
        }
        .ch-score.ended-score { color: #fff; }

        /* بيانات اضافية: التوقيت والبطولة */
        .ch-footer {
            display: flex;
            flex-direction: column;
            gap: 3px;
            border-top: 1px solid rgba(255,255,255,0.06);
            padding-top: 6px;
        }
        .ch-footer-row {
            display: flex;
            align-items: center;
            gap: 5px;
            font-size: 10px;
            color: rgba(255,255,255,0.5);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .ch-footer-row.time-row {
            color: var(--accent);
            font-weight: 700;
            font-size: 11px;
        }

        /* ===== PLAYER ===== */
        .player-area {
            flex: 1;
            min-height: 0;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px;
        }
        .player-wrapper {
            position: relative;
            width: 100%;
            max-width: 120vh;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0,0,0,0.6);
        }
        #clappr-player { width:100%; height:100%; }
        video { object-fit: fill !important; width:100% !important; height:100% !important; }

        /* زر تحديث القناة الحالية */
        .refresh-btn {
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 9999999;
            background: rgba(10,10,10,0.82);
            border: 1px solid rgba(255,255,255,0.12);
            color: #fff;
            padding: 6px 13px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 11px;
            display: flex;
            align-items: center;
            gap: 6px;
            backdrop-filter: blur(6px);
            transition: background 0.2s;
            font-family: inherit;
        }
        .refresh-btn:hover { background: rgba(66,20,128,0.75); }
        .refresh-btn svg { width:13px; height:13px; fill:currentColor; }
        .refresh-btn.spinning svg { animation: spin 0.6s linear; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* اللوجو */
        .custom-video-logo {
            position: absolute !important;
            top: 0.1% !important;
            right: 2.1% !important;
            z-index: 999999 !important;
            width: 18% !important;
            aspect-ratio: 1.45/1 !important;
            object-fit: fill !important;
            pointer-events: none !important;
            background: transparent !important;
            transition: right 0.15s ease;
        }

        /* overlay الصوت */
        .unmute-overlay {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%,-50%);
            z-index: 9999999;
            background: rgba(10,10,10,0.88);
            border: 1px solid rgba(0,255,136,0.3);
            color: #fff;
            padding: 13px 26px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 700;
            display: none;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            animation: pulse 2s infinite;
            font-family: inherit;
        }
        .unmute-overlay svg { width:20px; height:20px; fill:currentColor; }
        @keyframes pulse {
            0%   { box-shadow: 0 0 0 0 rgba(0,255,136,0.35); }
            70%  { box-shadow: 0 0 0 10px rgba(0,255,136,0); }
            100% { box-shadow: 0 0 0 0 rgba(0,255,136,0); }
        }

        /* overlay إيقاف */
        .offline-overlay {
            position: absolute;
            inset: 0;
            z-index: 9999998;
            background: rgba(7,7,8,0.94);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 24px;
            backdrop-filter: blur(12px);
        }
        .offline-overlay .off-icon {
            width: 56px; height: 56px;
            background: rgba(255,59,48,0.12);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 14px;
        }
        .offline-overlay .off-icon svg { width:28px; height:28px; fill:#ff3b30; }
        .offline-overlay h3 { font-size:16px; margin-bottom:6px; }
        .offline-overlay p  { font-size:12px; color:var(--text-muted); max-width:280px; line-height:1.6; }

        /* ===== INFO BAR ===== */
        .info-bar {
            flex-shrink: 0;
            background: var(--surface);
            border-top: 1px solid var(--border);
            padding: 5px 14px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .info-bar .score-now {
            font-size: 14px;
            font-weight: 900;
            color: var(--accent);
            letter-spacing: 3px;
        }

        @media (max-width:600px) {
            .match-badge { display:none; }
            .channel-card { width: 180px; }
        }
    </style>
</head>
<body>

    <!-- HEADER -->
    <div class="header">
        <div class="header-logo">Elwazer Sports</div>
        <div class="match-badge">
            <div class="live-dot"></div>
            <div class="badge-teams" id="badge-teams">جاري التحميل...</div>
            <div class="badge-time" id="badge-time"></div>
            <div class="badge-league" id="badge-league"></div>
        </div>
    </div>

    <!-- CHANNELS BAR -->
    <div class="channels-bar" id="channels-bar"></div>

    <!-- PLAYER -->
    <div class="player-area">
        <div class="player-wrapper">

            <button class="refresh-btn" id="refresh-btn" onclick="reloadCurrentChannel()">
                <svg viewBox="0 0 24 24">
                    <path d="M17.65 6.35A7.958 7.958 0 0012 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0112 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/>
                </svg>
                تحديث البث
            </button>

            <div id="clappr-player"></div>

            <img src="logo.png" class="custom-video-logo" id="custom-logo" alt="">

            <div id="offline-overlay" class="offline-overlay">
                <div class="off-icon">
                    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
                </div>
                <h3>البث متوقف مؤقتاً</h3>
                <p>يرجى تجربة قناة أخرى أو الانتظار قليلاً حتى يعود البث</p>
            </div>

            <div id="unmute-overlay" class="unmute-overlay" onclick="unmutePlayer()">
                <svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM19 12c0 3.28-2.16 6.07-5.14 7.03c1.92-.61 3.44-2.13 4.05-4.05C18.42 13.93 19 12.82 19 12zm-8.81 7.19L5.35 14H2v-4h3.35l4.84-5.19C10.74 4.26 11.5 4.61 11.5 5.3v13.4c0 .69-.76 1.04-1.31.49z"/></svg>
                اضغط لتفعيل الصوت
            </div>
        </div>
    </div>

    <!-- INFO BAR -->
    <div class="info-bar">
        <span id="info-match-name" style="color:#fff;font-weight:600;font-size:12px;">—</span>
        <span class="score-now" id="info-score"></span>
        <span id="info-update" style="font-size:10px;color:var(--text-muted);">—</span>
    </div>

<script>
// ============================================================
// بيانات مباريات كأس العالم 2026
// ============================================================
var WC_MATCHES = [
    {
        id: 1,
        teamA: "الولايات المتحدة",
        teamB: "استراليا",
        flagA: "&#127482;&#127480;",
        flagB: "&#127462;&#127482;",
        group: "المجموعة D",
        kickoff: "22:00",
        venue: "Lumen Field, Seattle",
        status: "live",
        scoreA: "", scoreB: "", minute: ""
    },
    {
        id: 2,
        teamA: "اسكتلندا",
        teamB: "المغرب",
        flagA: "&#127988;",
        flagB: "&#127474;&#127462;",
        group: "المجموعة C",
        kickoff: "01:00",
        venue: "Gillette Stadium, Boston",
        status: "waiting",
        scoreA: "", scoreB: "", minute: ""
    },
    {
        id: 3,
        teamA: "البرازيل",
        teamB: "هايتي",
        flagA: "&#127463;&#127479;",
        flagB: "&#127469;&#127481;",
        group: "المجموعة C",
        kickoff: "03:30",
        venue: "Lincoln Financial Field",
        status: "waiting",
        scoreA: "", scoreB: "", minute: ""
    },
    {
        id: 4,
        teamA: "تركيا",
        teamB: "باراغواي",
        flagA: "&#127481;&#127479;",
        flagB: "&#127477;&#127486;",
        group: "المجموعة D",
        kickoff: "05:00",
        venue: "Levi's Stadium, Santa Clara",
        status: "waiting",
        scoreA: "", scoreB: "", minute: ""
    }
];

var channels = [
    { name: "Server 1", url: "https://s3.us-east-2.amazonaws.com/cdnh123/hls/0/stream_1280x720_3300k.m3u8", matchId: 1 },
    { name: "Server 2", url: "https://edge22.776740.ir.cdn.ir/hls2/sport.m3u8",                             matchId: 1 },
    { name: "Server 3", url: "https://s3.eu-north-1.amazonaws.com/196.ccdd3333/hls/0/stream.m3u8",          matchId: 2 },
    { name: "Server 4", url: "https://2.simoplay.com/secure-hls/1781826402/fDFzv5hvKIfnC93jNGFXKw/ivedvqo3ltm.m3u8", matchId: 3 }
];

var player      = null;
var currentUrl  = "";
var activeIndex = 0;

// ============================================================
// بناء بطاقات القنوات
// ============================================================
function renderChannels() {
    var bar = document.getElementById('channels-bar');
    bar.innerHTML = '';

    channels.forEach(function(ch, i) {
        var match = getMatch(ch.matchId);
        var card  = document.createElement('div');
        card.className = 'channel-card' + (i === activeIndex ? ' active' : '');
        card.onclick   = function() { selectChannel(i); };

        var statusLabel = '';
        var statusClass = '';
        var scoreHtml   = '';

        if (match) {
            if (match.status === 'live') {
                statusLabel = '&#9679; مباشر';
                statusClass = 'live';
                if (match.scoreA !== '' && match.scoreB !== '') {
                    scoreHtml = '<div class="ch-score">' + match.scoreA + ' - ' + match.scoreB + '</div>';
                } else {
                    scoreHtml = '<div class="ch-score" style="font-size:11px;letter-spacing:1px;">جارية الان</div>';
                }
            } else if (match.status === 'waiting') {
                statusLabel = 'قريباً';
                statusClass = 'soon';
            } else if (match.status === 'ended') {
                statusLabel = 'انتهت';
                statusClass = 'ended';
                if (match.scoreA !== '' && match.scoreB !== '') {
                    scoreHtml = '<div class="ch-score ended-score">' + match.scoreA + ' - ' + match.scoreB + '</div>';
                }
            }
        }

        var flagA  = match ? match.flagA  : '';
        var flagB  = match ? match.flagB  : '';
        var nameA  = match ? match.teamA  : '—';
        var nameB  = match ? match.teamB  : '—';
        var time   = match ? match.kickoff + ' بتوقيت الرياض' : '—';
        var grp    = match ? match.group + ' | كأس العالم 2026' : '—';
        var venue  = match ? match.venue  : '';

        card.innerHTML =
            '<div class="ch-header">' +
                '<span class="ch-name">' + esc(ch.name) + '</span>' +
                '<span class="ch-status ' + statusClass + '">' + statusLabel + '</span>' +
            '</div>' +

            '<div class="ch-teams-inline">' +
                '<div class="ch-team-side">' +
                    '<span class="t-flag">' + flagA + '</span>' +
                    '<span class="t-name">' + esc(nameA) + '</span>' +
                '</div>' +
                '<span class="ch-vs-mid">VS</span>' +
                '<div class="ch-team-side right">' +
                    '<span class="t-name">' + esc(nameB) + '</span>' +
                    '<span class="t-flag">' + flagB + '</span>' +
                '</div>' +
            '</div>' +

            (scoreHtml ? scoreHtml : '') +

            '<div class="ch-footer">' +
                '<div class="ch-footer-row time-row">' +
                    '<span>&#9201;</span><span>' + time + '</span>' +
                '</div>' +
                '<div class="ch-footer-row">' +
                    '<span>&#127942;</span><span>' + grp + '</span>' +
                '</div>' +
                (venue ? '<div class="ch-footer-row"><span>&#127967;</span><span>' + esc(venue) + '</span></div>' : '') +
            '</div>';

        bar.appendChild(card);
    });
}

// ============================================================
// تحديث الهيدر والمعلومات
// ============================================================
function updateMatchUI(ch) {
    var match = getMatch(ch.matchId);
    if (!match) return;

    var teamsStr = match.teamA + '  vs  ' + match.teamB;
    document.getElementById('badge-teams').textContent  = teamsStr;
    document.getElementById('badge-time').textContent   = match.kickoff;
    document.getElementById('badge-league').textContent = match.group + ' | كأس العالم 2026';
    document.getElementById('info-match-name').textContent = teamsStr;

    var scoreEl = document.getElementById('info-score');
    if ((match.status === 'live' || match.status === 'ended') && match.scoreA !== '') {
        scoreEl.textContent = match.scoreA + ' - ' + match.scoreB;
    } else {
        scoreEl.textContent = '';
    }
    document.getElementById('info-update').textContent =
        'اخر تحديث: ' + new Date().toLocaleTimeString('ar-SA');
}

// ============================================================
// اختيار قناة
// ============================================================
function selectChannel(idx) {
    activeIndex = idx;
    renderChannels();
    updateMatchUI(channels[idx]);
    loadStream(channels[idx].url);
}

// ============================================================
// تحديث نفس القناة الحالية فقط
// ============================================================
function reloadCurrentChannel() {
    var btn = document.getElementById('refresh-btn');
    btn.classList.add('spinning');
    setTimeout(function() { btn.classList.remove('spinning'); }, 650);
    if (!currentUrl || currentUrl === '#') return;
    document.getElementById('offline-overlay').style.display = 'none';
    if (player) {
        try {
            player.load(currentUrl);
            player.play();
            player.unmute();
            player.setVolume(100);
            document.getElementById('unmute-overlay').style.display = 'none';
        } catch(e) { loadStream(currentUrl); }
    } else {
        loadStream(currentUrl);
    }
}

// ============================================================
// Clappr
// ============================================================
function loadStream(url) {
    currentUrl = url;
    var offEl = document.getElementById('offline-overlay');
    var unmEl = document.getElementById('unmute-overlay');
    if (player) { try { player.destroy(); } catch(e){} player = null; }
    if (!url || url === '#') { offEl.style.display='flex'; unmEl.style.display='none'; return; }
    offEl.style.display = 'none';

    player = new Clappr.Player({
        source: url,
        parentId: '#clappr-player',
        width: '100%', height: '100%',
        autoPlay: true, mute: true, preload: 'auto',
        playback: {
            playInline: true, recycleVideo: true,
            hlsjsConfig: {
                enableWorker: true, lowLatencyMode: true,
                maxBufferLength: 12, liveBackBufferLength: 0,
                manifestLoadingMaxRetry: 10, levelLoadingMaxRetry: 10
            }
        }
    });

    player.on(Clappr.Events.PLAYER_READY, function() {
        injectOverlays();
        player.unmute();
        setTimeout(function() {
            if (player && player.getVolume() === 0)
                document.getElementById('unmute-overlay').style.display = 'flex';
        }, 700);
    });
    player.on(Clappr.Events.CORE_CONTAINERS_CREATED, injectOverlays);
    player.on(Clappr.Events.PLAYER_PLAY, function() {
        document.getElementById('offline-overlay').style.display = 'none';
    });
    player.on(Clappr.Events.PLAYER_ERROR, function() {
        document.getElementById('offline-overlay').style.display = 'flex';
        document.getElementById('unmute-overlay').style.display  = 'none';
        setTimeout(function() {
            if (currentUrl && currentUrl !== '#' && player) { player.load(currentUrl); player.play(); }
        }, 5000);
    });
    player.on(Clappr.Events.CORE_FULLSCREEN, function(full) {
        var logo = document.getElementById('custom-logo');
        if (logo) logo.style.setProperty('right', full ? '4.5%' : '2.1%', 'important');
        injectOverlays();
    });
}

function injectOverlays() {
    if (!player || !player.core || !player.core.el) return;
    var c = player.core.el;
    ['custom-logo','unmute-overlay','offline-overlay'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el && el.parentElement !== c) c.appendChild(el);
    });
}
function unmutePlayer() {
    if (player) { player.unmute(); player.setVolume(100); }
    document.getElementById('unmute-overlay').style.display = 'none';
}
document.body.addEventListener('click', function() {
    if (document.getElementById('unmute-overlay').style.display === 'flex') unmutePlayer();
}, { once: true });

function getMatch(id) {
    for (var i = 0; i < WC_MATCHES.length; i++)
        if (WC_MATCHES[i].id === id) return WC_MATCHES[i];
    return null;
}
function esc(s) {
    return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ============================================================
// جلب النتائج الحية
// ============================================================
var nameMap = {
    'الولايات المتحدة': 'united states',
    'استراليا':         'australia',
    'اسكتلندا':         'scotland',
    'المغرب':           'morocco',
    'البرازيل':         'brazil',
    'هايتي':            'haiti',
    'تركيا':            'turkey',
    'باراغواي':         'paraguay'
};

async function fetchLiveScores() {
    var proxies = [
        'https://api.allorigins.win/raw?url=',
        'https://thingproxy.freeboard.io/fetch/',
        'https://api.codetabs.com/v1/proxy?quest='
    ];
    var target = 'https://www.ysscores.com/en/today_matches';
    for (var p = 0; p < proxies.length; p++) {
        try {
            var ctrl = new AbortController();
            var tid  = setTimeout(function(){ ctrl.abort(); }, 10000);
            var resp = await fetch(proxies[p] + encodeURIComponent(target), { signal: ctrl.signal });
            clearTimeout(tid);
            if (!resp.ok) continue;
            var html = await resp.text();
            if (!html || html.length < 500) continue;
            parseScores(html);
            break;
        } catch(e) { console.warn('proxy', p, 'failed'); }
    }
}

function parseScores(html) {
    var parser = new DOMParser();
    var doc    = parser.parseFromString(html, 'text/html');
    var links  = doc.querySelectorAll('a[href*="/match/"]');
    links.forEach(function(link) {
        var text = link.textContent || '';
        WC_MATCHES.forEach(function(match) {
            var nA = nameMap[match.teamA];
            var nB = nameMap[match.teamB];
            if (!nA || !nB) return;
            if (text.toLowerCase().includes(nA) && text.toLowerCase().includes(nB)) {
                var sm = text.match(/(\d+)\s*[-*]\s*(\d+)/);
                if (sm) { match.scoreA = sm[1]; match.scoreB = sm[2]; }
                if (/live|playing|\d+[']/i.test(text)) {
                    match.status = 'live';
                } else if (/ended|finished|\bft\b/i.test(text)) {
                    match.status = 'ended';
                }
            }
        });
    });
    renderChannels();
    updateMatchUI(channels[activeIndex]);
}

// ============================================================
// تشغيل
// ============================================================
document.addEventListener('DOMContentLoaded', function() {
    renderChannels();
    updateMatchUI(channels[0]);
    loadStream(channels[0].url);
    fetchLiveScores();
    setInterval(fetchLiveScores, 60000);
});
