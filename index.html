<!DOCTYPE html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">

        <title>الوزير سبورت - Elwazer Sports | جدول مباريات اليوم والبث المباشر</title>
        
        <!-- استدعاء مكتبة المشغل العالمي Clappr Player -->
        <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
        
        <style>
            :root {
                --primary: #421480;
                --primary-gradient: linear-gradient(135deg, #2e0d5e 0%, #421480 100%);
                --bg-dark: #070708;
                --card-bg: #111115;
                --border-color: rgba(255, 255, 255, 0.06);
                --text-muted: rgba(255, 255, 255, 0.6);
            }

            * { margin: 0; padding: 0; box-sizing: border-box }
            html, body { scroll-behavior: smooth; }
            body { 
                background: var(--bg-dark); 
                color: #fff; 
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                line-height: 1.6;
                padding-bottom: 40px;
            }

            /* الهيدر العلوي للموقع */
            header {
                background: #0d0d11;
                border-bottom: 1px solid var(--border-color);
                padding: 15px 20px;
                text-align: center;
                position: sticky;
                top: 0;
                z-index: 100;
            }
            header h1 {
                font-size: 20px;
                font-weight: 800;
                background: linear-gradient(90deg, #ff007f, #00ff88);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
            }

            .container {
                max-width: 1100px;
                margin: 0 auto;
                padding: 15px;
            }

            /* قسم المشغل المغلق افتراضياً ويفتح عند اختيار مباراة */
            .live-section {
                display: none; 
                margin-bottom: 25px;
                background: #0d0d11;
                border-radius: 12px;
                border: 1px solid var(--border-color);
                overflow: hidden;
                box-shadow: 0 10px 35px rgba(0, 0, 0, 0.5);
                animation: slideDown 0.4s ease-out;
            }

            @keyframes slideDown {
                from { opacity: 0; transform: translateY(-20px); }
                to { opacity: 1; transform: translateY(0); }
            }

            /* شريط التحكم العلوي للمشغل */
            .player-top-bar {
                display: flex;
                justify-content: space-between;
                align-items: center;
                background: #07070a;
                padding: 10px 15px;
                border-bottom: 1px solid var(--border-color);
            }
            .player-title {
                font-size: 13px;
                font-weight: bold;
                color: #00ff88;
            }

            /* أزرار التحكم بالمشغل */
            .player-control-btn {
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--border-color);
                color: #fff;
                padding: 6px 12px;
                border-radius: 6px;
                cursor: pointer;
                display: inline-flex;
                align-items: center;
                gap: 5px;
                font-size: 11px;
                transition: background 0.2s;
                text-decoration: none;
            }
            .player-control-btn:hover {
                background: rgba(255, 255, 255, 0.1);
            }
            .player-control-btn.close-btn {
                background: rgba(255, 59, 48, 0.15);
                border-color: rgba(255, 59, 48, 0.3);
                color: #ff3b30;
                font-weight: bold;
            }
            .player-control-btn.close-btn:hover {
                background: rgba(255, 59, 48, 0.25);
            }

            .player-container { 
                position: relative; 
                width: 100%; 
                background: #000; 
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 10px;
            }

            .player-wrapper {
                position: relative;
                width: 100%;
                max-width: 120vh; 
                aspect-ratio: 16 / 9;
                background: #000;
                border-radius: 8px;
                overflow: hidden;
            }

            #clappr-player { width: 100%; height: 100%; }

            /* اللوجو الأصلي المعتمد بالكامل دون أدنى تغيير في الأبعاد */
            .custom-video-logo {
                position: absolute !important;
                top: 0.1% !important;            
                right: 2.1% !important;          
                z-index: 999999 !important;      
                width: 18% !important;           
                aspect-ratio: 1.45 / 1 !important; 
                object-fit: fill !important;     
                pointer-events: none !important;
                background: transparent !important; 
            }

            /* أزرار السيرفرات الأربعة أسفل المشغل مباشرة لتغيير السورس حياً */
            .player-servers-container {
                background: #0c0c0c;
                border-top: 1px solid var(--border-color);
                padding: 12px 15px;
            }
            .server-label {
                font-size: 11px; color: var(--text-muted); font-weight: bold; margin-bottom: 8px;
            }
            .servers-row {
                display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none;
            }
            .servers-row::-webkit-scrollbar { display: none; }
            .server-tab-btn {
                flex: 1;
                min-width: 90px;
                padding: 8px;
                font-size: 11px;
                font-weight: bold;
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid var(--border-color);
                color: var(--text-muted);
                border-radius: 8px;
                cursor: pointer;
                transition: all 0.25s ease;
                text-align: center;
            }
            .server-tab-btn:hover { background: rgba(255, 255, 255, 0.06); color: #fff; }
            .server-tab-btn.active {
                background: var(--primary-gradient);
                color: #fff;
                border-color: rgba(50,15,100,.5);
                box-shadow: 0 2px 10px rgba(46,13,94,.3);
            }

            /* زر تفعيل الصوت التفاعلي المطور للتغلب على حماية المتصفحات */
            .unmute-overlay {
                position: absolute;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                z-index: 9999999 !important;
                background: rgba(10, 10, 10, 0.85);
                border: 1px solid rgba(255, 255, 255, 0.15);
                color: #fff;
                padding: 12px 24px;
                border-radius: 30px;
                font-size: 14px;
                font-weight: bold;
                display: none; 
                align-items: center;
                gap: 10px;
                cursor: pointer;
                backdrop-filter: blur(8px);
                box-shadow: 0 10px 25px rgba(0,0,0,0.5);
                animation: pulse 2s infinite;
            }
            .unmute-overlay svg { width: 20px; height: 20px; fill: currentColor; }

            /* لوحة التنبيه الزجاجية الأنيقة في حال كان البث متوقفاً */
            .offline-overlay {
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 9999998 !important;
                background: rgba(10, 10, 10, 0.92);
                display: none; 
                flex-direction: column;
                align-items: center;
                justify-content: center;
                color: #fff;
                text-align: center;
                padding: 20px;
                backdrop-filter: blur(10px);
            }
            .offline-overlay svg { width: 55px; height: 55px; fill: #ff3b30; margin-bottom: 15px; }

            /* 🎯 شريط تبديل الأيام المطور بالتاريخ حياً 🎯 */
            .date-tabs-container {
                display: flex;
                gap: 12px;
                margin: 20px 0;
                justify-content: center;
                flex-wrap: wrap; 
            }
            .date-tab-btn {
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid var(--border-color);
                color: var(--text-muted);
                padding: 10px 20px;
                border-radius: 30px;
                font-size: 12px;
                font-weight: bold;
                cursor: pointer;
                transition: all 0.25s ease;
                white-space: nowrap;
                display: inline-flex;
                align-items: center;
                gap: 6px;
            }
            .date-tab-btn:hover {
                background: rgba(255, 255, 255, 0.08);
                color: #fff;
            }
            .date-tab-btn.active {
                background: var(--primary-gradient);
                color: #fff;
                border-color: rgba(50, 15, 100, 0.5);
                box-shadow: 0 4px 15px rgba(46, 13, 94, 0.4);
            }

            /* عنوان قسم جدول المباريات */
            .section-title {
                font-size: 16px; font-weight: bold; margin: 25px 0 15px; padding-right: 10px;
                border-right: 3px solid #421480; display: flex; align-items: center; justify-content: space-between;
            }

            /* كروت المباريات */
            .matches-grid {
                display: grid; grid-template-columns: 1fr; gap: 12px;
                min-height: 200px;
            }
            @media (min-width: 768px) {
                .matches-grid { grid-template-columns: 1fr 1fr; }
            }

            .match-card {
                background: var(--card-bg);
                border: 1px solid var(--border-color);
                border-radius: 12px;
                padding: 15px;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
                cursor: pointer;
                transition: transform 0.2s, border-color 0.2s;
            }
            .match-card:hover {
                transform: translateY(-2px);
                border-color: rgba(66, 20, 128, 0.4);
            }

            .match-league {
                font-size: 11px; color: var(--text-muted); font-weight: bold; margin-bottom: 10px;
                display: flex; justify-content: space-between; align-items: center;
            }
            .match-status {
                padding: 2px 8px; border-radius: 10px; font-size: 10px; font-weight: bold;
            }
            .status-live { background: rgba(255, 0, 127, 0.15); color: #00ff88; animation: blink 1.5s infinite; }
            .status-waiting { background: rgba(255, 255, 255, 0.05); color: var(--text-muted); }
            .status-ended { background: rgba(255, 255, 255, 0.08); color: var(--text-muted); }

            @keyframes blink { 50% { opacity: 0.5; } }

            .match-teams {
                display: flex; align-items: center; justify-content: space-between; margin: 10px 0;
            }
            .team-col {
                flex: 1; display: flex; flex-direction: column; align-items: center; text-align: center; gap: 8px;
            }
            .team-logo { width: 45px; height: 45px; object-fit: contain; }
            .team-name { font-size: 13px; font-weight: bold; }

            .match-time-info {
                text-align: center; font-size: 11px; color: var(--text-muted); min-width: 90px;
            }
            .match-time { font-size: 15px; font-weight: bold; color: #fff; margin-bottom: 3px; }
            
            /* تنسيقات الأهداف الحية والنتائج النهائية */
            .match-score-live { font-size: 20px; font-weight: 800; color: #00ff88; letter-spacing: 2px; }
            .match-score-final { font-size: 20px; font-weight: 800; color: #fff; letter-spacing: 2px; }
            .match-minute-badge { background: rgba(0, 255, 136, 0.15); color: #00ff88; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; margin-top: 4px; display: inline-block; }
            .match-status-ended { font-size: 10px; color: var(--text-muted); margin-top: 4px; }

            .match-meta {
                border-top: 1px solid rgba(255,255,255,0.03); padding-top: 8px; margin-top: 10px;
                display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted);
            }

            .btn-watch {
                display: block; width: 100%; text-align: center; background: var(--primary-gradient);
                color: #fff; text-decoration: none; padding: 10px; border-radius: 8px; font-size: 12px;
                font-weight: bold; margin-top: 12px; border: none; cursor: pointer; transition: opacity 0.2s;
            }
            .btn-watch:hover { opacity: 0.9; }

            /* حالة عدم وجود مباريات بشكل منظم */
            .empty-state {
                grid-column: 1 / -1;
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                text-align: center;
                padding: 40px 20px;
                border-radius: 12px;
                border: 1px dashed var(--border-color);
                color: var(--text-muted);
                font-size: 13px;
                background: #0b0b0e;
            }

            @media (max-width: 768px) {
                .custom-video-logo { right: 2.1% !important; top: 0.1% !important; width: 18% !important; }
            }
        </style>
    </head>
    <body>
        
        <header>
            <h1>الوزير سبورت - Elwazer Sports</h1>

        <div class="container">

            <div id="live-section" class="live-section">

                <!-- السيرفرات والقنوات الأربعة الخاصة بك مدمجة مباشرة أسفل مشغل كل مباراة -->
                <div class="player-servers-container">

                    <div class="servers-row">
                        <button class="server-tab-btn active" onclick="switchServer('https://live.kooran53.cfd/goolato3_480/index.m3u8', this)">Server 1</button>
                        <button class="server-tab-btn" onclick="switchServer('https://2cup.s3.us-east-2.amazonaws.com/max2/max2_720p/index.m3u8', this)">Server 2</button>
                        <button class="server-tab-btn" onclick="switchServer('#', this)">Server 3</button>

            <!-- جدول مباريات اليوم المباشر -->
            <div class="section-title">
                <span>📅 جدول مباريات اليوم</span>
                <button class="player-control-btn" onclick="loadMatchesFromYSscores(false)" style="padding: 4px 10px; font-size: 10px;">
                    🔄 تحديث جدول المباريات
                </button>
            </div>

            <!-- 🎯 أزرار تبديل الأيام (أمس، اليوم، غداً) مع إظهار التواريخ حية بجانبها 🎯 -->
            <div class="date-tabs-container">
                <button class="date-tab-btn" id="date-btn-yesterday" onclick="changeDateOffset(-1, this)">⬅️ مباريات الأمس</button>
                <button class="date-tab-btn active" id="date-btn-today" onclick="changeDateOffset(0, this)">📅 مباريات اليوم</button>
                <button class="date-tab-btn" id="date-btn-tomorrow" onclick="changeDateOffset(1, this)">مباريات الغد ➡️</button>
            </div>

                <!-- جاري جلب المباريات برمجياً -->

        <script>
            var player = null;
            var currentPlayingUrl = "";
            var activeDateOffset = 0; // 0 لليوم، -1 للأمس, 1 للغد

            // دالة لحساب وتنسيق تواريخ الأيام الثلاثة بالصيغة العربية (DD-MM-YYYY)
            function getFormattedDate(offset) {
                var d = new Date();
                d.setDate(d.getDate() + offset);
                var yyyy = d.getFullYear();
                var mm = String(d.getMonth() + 1).padStart(2, '0');
                var dd = String(d.getDate()).padStart(2, '0');
                return `${dd}-${mm}-${yyyy}`;
            }

            // دالة لحساب التاريخ المقابل لـ Offset بدقة ونقلها لـ YSscores بالصيغة البرمجية القياسية
            function getOffsetDateString(offset) {
                var d = new Date();
                d.setDate(d.getDate() + offset);
                var yyyy = d.getFullYear();
                var mm = String(d.getMonth() + 1).padStart(2, '0');
                var dd = String(d.getDate()).padStart(2, '0');
                return `${yyyy}-${mm}-${dd}`;
            }

            // وظيفة تبديل الأيام وإعادة شحن الجدول
            function changeDateOffset(offset, element) {
                activeDateOffset = offset;
                
                document.querySelectorAll('.date-tab-btn').forEach(function(btn) {
                    btn.classList.remove('active');
                });
                element.classList.add('active');
                
                loadMatchesFromYSscores(false);
            }
            
            // 🎯 معالج السحب الحصري لجدول المباريات الحية من موقع Sofascore 🎯
            async function loadMatchesFromYSscores(isSilent) {
                var statusBox = document.getElementById('scrape-status');
                var dateString = getOffsetDateString(activeDateOffset);
                
                // 🎯 استخدام الرابط الحقيقي والمباشر لـ scheduled-events عبر خوادم Sofascore 🎯
                var targetUrl = `https://api.sofascore.com/api/v1/sport/football/scheduled-events/${dateString}`;
                
                // سيرفرات الوساطة للتغلب على حماية النطاقات الخارجية
                var proxies = [
                    'https://corsproxy.io/?url=',
                    'https://api.allorigins.win/get?url=',
                    'https://api.codetabs.com/v1/proxy?quest='
                ];

                var jsonContent = null;
                var success = false;

                if (!isSilent && statusBox) {
                    statusBox.innerHTML = `🔄 جاري جلب مباريات تاريخ ${getFormattedDate(activeDateOffset)} من Sofascore...`;
                    statusBox.style.color = "var(--text-muted)";
                }

                for (var i = 0; i < proxies.length; i++) {
                    try {
                        var proxyUrl = proxies[i] + encodeURIComponent(targetUrl);
                        var response = await fetch(proxyUrl);
                        if (!response.ok) continue; 
                        
                        var rawText = "";
                        if (proxies[i].includes('allorigins')) {
                            var json = await response.json();
                            rawText = json.contents;
                        } else {
                            rawText = await response.text();
                        }

                        if (rawText && rawText.trim().length > 50) {
                            jsonContent = JSON.parse(rawText);
                            if (jsonContent && jsonContent.events && jsonContent.events.length > 0) {
                                success = true;
                                break;
                            }
                        }
                    } catch (e) {
                        console.warn(`سيرفر الوساطة ${i + 1} لم ينجح:`, e.message);
                    }
                }

                if (!success) {
                    if (!isSilent && statusBox) {
                        statusBox.innerHTML = "❌ تعذر جلب المباريات حالياً من Sofascore. يرجى إعادة المحاولة.";
                        statusBox.style.color = "#ff3b30";
                    }
                    renderMatches([]); 
                    return;
                }

                if (!isSilent && statusBox) {
                    statusBox.innerHTML = `✅ تم تحديث جدول مباريات تاريخ ${getFormattedDate(activeDateOffset)} حياً ومباشرة من Sofascore!`;
                    statusBox.style.color = "#00ff88";
                }

                try {
                    var matchesList = [];
                    var events = jsonContent.events;

                    // ترتيب المباريات لتظهر البطولات الكبرى دائماً في مقدمة الصفحة
                    var majorTournaments = ["World Cup", "FIFA World Cup", "Champions League", "UEFA Champions League", "Premier League", "LaLiga", "Serie A", "Bundesliga", "Ligue 1", "Botola Pro", "الدوري المغربي", "الدوري المصري", "Saudi Pro League", "الدوري السعودي"];
                    
                    events.sort(function(a, b) {
                        var nameA = a.tournament.name || "";
                        var nameB = b.tournament.name || "";
                        
                        var isMajorA = majorTournaments.some(function(t) { return nameA.toLowerCase().includes(t.toLowerCase()); });
                        var isMajorB = majorTournaments.some(function(t) { return nameB.toLowerCase().includes(t.toLowerCase()); });
                        
                        if (isMajorA && !isMajorB) return -1;
                        if (!isMajorA && isMajorB) return 1;
                        return 0;
                    });

                    // تصفية وعرض أهم 50 مباراة لليوم لضمان استقرار وتجاوب الواجهة
                    var maxMatches = Math.min(events.length, 50);
                    for (var index = 0; index < maxMatches; index++) {
                        var item = events[index];
                        
                        var league = item.tournament.name || "International Match";
                        var nameA = item.homeTeam.name || "Team A";
                        var nameB = item.awayTeam.name || "Team B";
                        
                        // جلب الشعارات بجودة فائقة ونقاء كلي مباشرة عبر خوادم Sofascore
                        var logoA = `https://api.sofascore.com/api/v1/team/${item.homeTeam.id}/image`;
                        var logoB = `https://api.sofascore.com/api/v1/team/${item.awayTeam.id}/image`;
                        
                        // قراءة وعرض النتيجة الحية والنهائية بدقة متناهية
                        var scoreA = "";
                        var scoreB = "";
                        if (item.homeScore && item.homeScore.current !== undefined) {
                            scoreA = item.homeScore.current;
                        }
                        if (item.awayScore && item.awayScore.current !== undefined) {
                            scoreB = item.awayScore.current;
                        }

                        // تحويل الوقت الفعلي بشكل محلي يتناسب مع منطقتك الزمنية تلقائياً
                        var matchTime = "09:00 PM";
                        if (item.startTimestamp) {
                            var dateObj = new Date(item.startTimestamp * 1000);
                            var hours = dateObj.getHours();
                            var minutes = String(dateObj.getMinutes()).padStart(2, '0');
                            var ampm = hours >= 12 ? 'PM' : 'AM';
                            var hours12 = hours % 12 || 12;
                            matchTime = `${String(hours12).padStart(2, '0')}:${minutes} ${ampm}`;
                        }

                        // تحديد حالة اللقاء والملعب والدقائق
                        var status = "waiting";
                        var minute = "";
                        if (item.status) {
                            var type = item.status.type || "";
                            var desc = item.status.description || "";
                            
                            if (type === 'inprogress' || desc.toLowerCase().includes('half') || desc.toLowerCase().includes('min')) {
                                status = "live";
                                minute = desc;
                            } else if (type === 'finished' || desc.toLowerCase().includes('ended') || desc.toLowerCase().includes('ft')) {
                                status = "ended";
                            }
                        }

                        matchesList.push({
                            id: index + 1,
                            league: league,
                            status: status,
                            teamA: { name: nameA, logo: logoA },
                            teamB: { name: nameB, logo: logoB },
                            time: matchTime,
                            scoreA: scoreA,
                            scoreB: scoreB,
                            minute: minute,
                            channel: "beIN Sports MAX 1"
                        });
                    }

                    renderMatches(matchesList);

                } catch (err) {
                    console.error("Error parsing Sofascore API JSON:", err);
                }
            }

            // عرض الكروت في الواجهة مع النتائج الحية والبطولات الحقيقية (بدون معلق)
            function renderMatches(list) {
                var container = document.getElementById('matches-container');
                container.innerHTML = "";

                if (list.length === 0) {
                    container.innerHTML = `
                        <div class="empty-state">
                            📡 لا توجد مباريات حية معروضة حالياً من المصدر لهذا اليوم، أو أن خوادم YSscores محجوبة مؤقتاً.
                            <button class="player-control-btn" onclick="loadMatchesFromYSscores(false)" style="margin-top: 15px; background: var(--primary-gradient);">🔄 إعادة المحاولة والتحميل</button>
                        </div>
                    `;
                    return;
                }

                list.forEach(function(match) {
                    var statusClass = 'status-waiting';
                    var statusText = 'لم تبدأ';
                    if (match.status === 'live') {
                        statusClass = 'status-live';
                        statusText = '● مباشر الآن';
                    } else if (match.status === 'ended') {
                        statusClass = 'status-ended';
                        statusText = 'انتهت';
                    }

                    // تشكيل العمود الأوسط لعرض النتائج الحية والأهداف تلقائياً
                    var centerHtml = "";
                    if (match.status === 'live') {
                        centerHtml = `
                            <div class="match-time-info">
                                <div class="match-score-live">${match.scoreA} - ${match.scoreB}</div>
                                <div class="match-minute-badge">🔥 دقيقة ${match.minute || 'الآن'}</div>
                            </div>
                        `;
                    } else if (match.status === 'ended') {
                        centerHtml = `
                            <div class="match-time-info">
                                <div class="match-score-final">${match.scoreA} - ${match.scoreB}</div>
                                <div class="match-status-ended">انتهت المباراة</div>
                            </div>
                        `;
                    } else {
                        centerHtml = `
                            <div class="match-time-info">
                                <div class="match-time">${match.time}</div>
                                <span>توقيت اللقاء</span>
                            </div>
                        `;
                    }

                    var btnText = match.status === 'live' ? 'شاهد البث المباشر 📡' : 'تفاصيل المباراة 📊';

                    var html = `
                        <div class="match-card" onclick="selectMatch(${JSON.stringify(match).replace(/"/g, '&quot;')})">
                            <div class="match-league">
                                <span>🏆 ${match.league}</span>
                                <span class="match-status ${statusClass}">${statusText}</span>
                            </div>
                            <div class="match-teams">
                                <div class="team-col">
                                    <img class="team-logo" src="${match.teamA.logo}" alt="${match.teamA.name}">
                                    <span class="team-name">${match.teamA.name}</span>
                                </div>
                                ${centerHtml}
                                <div class="team-col">
                                    <img class="team-logo" src="${match.teamB.logo}" alt="${match.teamB.name}">
                                    <span class="team-name">${match.teamB.name}</span>
                                </div>
                            </div>
                            <div class="match-meta">
                                <span>📺 ${match.channel}</span>
                            </div>
                            <button class="btn-watch">${btnText}</button>
                        </div>
                    `;
                    container.innerHTML += html;
                });
            }

            // اختيار مباراة وتشغيل السيرفر الأول
            function selectMatch(match) {
                var liveSection = document.getElementById('live-section');
                liveSection.style.display = 'block';
                liveSection.scrollIntoView({ behavior: 'smooth', block: 'start' });

                document.getElementById('player-status-title').innerText = "📡 مباراة: " + match.teamA.name + " ضد " + match.teamB.name;

                // إعادة تفعيل السيرفر الأول كخيار افتراضي عند فتح اللقاء
                var defaultServerBtn = document.querySelector('.server-tab-btn');
                var defaultUrl = "https://live.kooran53.cfd/goolato3_480/index.m3u8";
                
                // إعادة تهيئة تظليل الأزرار
                document.querySelectorAll('.server-tab-btn').forEach(function(btn) { btn.classList.remove('active'); });
                if (defaultServerBtn) defaultServerBtn.classList.add('active');

                loadStream(defaultUrl);
            }

            // تشغيل السيرفرات الأربعة لتبديل السورس
            function switchServer(url, btnElement) {
                document.querySelectorAll('.server-tab-btn').forEach(function(btn) { btn.classList.remove('active'); });
                btnElement.classList.add('active');
                loadStream(url);
            }

            // تحميل البث داخل Clappr
            function loadStream(url) {
                currentPlayingUrl = url;

                var offlineOverlay = document.getElementById('offline-overlay');
                var unmuteOverlay = document.getElementById('unmute-overlay');

                if (player) {
                    player.destroy();
                }

                if (!url || url === '#' || url === '') {
                    offlineOverlay.style.display = 'flex';
                    unmuteOverlay.style.display = 'none';
                } else {
                    offlineOverlay.style.display = 'none';
                    
                    player = new Clappr.Player({
                        source: url,
                        parentId: '#clappr-player',
                        width: '100%',
                        height: '100%',
                        autoPlay: true,
                        mute: true,
                        preload: 'auto',
                        stretching: 'exactfit',
                        playback: {
                            playInline: true,
                            recycleVideo: true,
                            hlsMinimumjsversion: '0.12.0',
                            hlsjsConfig: {
                                enableWorker: true,
                                lowLatencyMode: true,
                                maxBufferLength: 12,
                                liveBackBufferLength: 0,
                                manifestLoadingMaxRetry: 10,
                                levelLoadingMaxRetry: 10
                            }
                        }
                    });

                    player.on(Clappr.Events.PLAYER_READY, function() {
                        injectOverlays();
                        player.unmute();
                        setTimeout(function() {
                            var volumePlugin = player.getPlugin('volume');
                            if (player.getVolume() === 0 || (volumePlugin && volumePlugin.$el.hasClass('muted'))) {
                                document.getElementById('unmute-overlay').style.display = 'flex';
                            }
                        }, 600);
                    });

                    player.on(Clappr.Events.CORE_CONTAINERS_CREATED, function() {
                        injectOverlays();
                    });

                    player.on(Clappr.Events.PLAYER_PLAY, function() {
                        document.getElementById('offline-overlay').style.display = 'none';
                    });

                    player.on(Clappr.Events.CORE_FULLSCREEN, function(isCurrentlyFullscreen) {
                        var logo = document.getElementById('custom-logo');
                        if (logo) {
                            if (isCurrentlyFullscreen) {
                                logo.style.setProperty('right', '4.5%', 'important');
                            } else {
                                logo.style.setProperty('right', '2.1%', 'important');
                            }
                        }
                    });

                    player.on(Clappr.Events.PLAYER_ERROR, function() {
                        offlineOverlay.style.display = 'flex';
                        unmuteOverlay.style.display = 'none';

                        setTimeout(function() {
                            if (currentPlayingUrl && currentPlayingUrl !== '#') {
                                player.load(currentPlayingUrl);
                                player.play();
                            }
                        }, 5000);
                    });
                }
            }

            // إغلاق البث والرجوع للرئيسية
            function closeLiveSection() {
                var liveSection = document.getElementById('live-section');
                liveSection.style.display = 'none';
                
                if (player) {
                    player.destroy();
                    player = null;
                }
                
                document.getElementById('matches-container').scrollIntoView({ behavior: 'smooth', block: 'start' });
            }

            function unmutePlayer() {
                if (player) {
                    player.unmute();
                    player.setVolume(100);
                }
                document.getElementById('unmute-overlay').style.display = 'none';
            }

            document.body.addEventListener('click', function() {
                var unmuteOverlay = document.getElementById('unmute-overlay');
                if (unmuteOverlay.style.display === 'flex') {
                    unmutePlayer();
                }
            }, { once: true });

            function injectOverlays() {
                if (player && player.core && player.core.el) {
                    var clapprContainer = player.core.el;
                    var logo = document.getElementById('custom-logo');
                    var unmute = document.getElementById('unmute-overlay');
                    var offline = document.getElementById('offline-overlay');

                    if (logo && logo.parentElement !== clapprContainer) {
                        clapprContainer.appendChild(logo);
                    }
                    if (unmute && unmute.parentElement !== clapprContainer) {
                        clapprContainer.appendChild(unmute);
                    }
                    if (offline && offline.parentElement !== clapprContainer) {
                        clapprContainer.appendChild(offline);
                    }
                }
            }

            // انطلاق جلب المباريات حياً عند التحميل أول مرة
            document.addEventListener("DOMContentLoaded", function() {
                // وضع التواريخ الحية بجوار أزرار التبديل الثلاثة [2]
                document.getElementById('date-btn-yesterday').innerHTML = `⬅️ الأمس (${getFormattedDate(-1)})`;
                document.getElementById('date-btn-today').innerHTML = `📅 اليوم (${getFormattedDate(0)})`;
                document.getElementById('date-btn-tomorrow').innerHTML = `مباريات الغد ➡️ (${getFormattedDate(1)})`;

                loadMatchesFromYSscores(false);
            });

            // تحديث صامت وتلقائي للنتائج والأهداف والدقائق في الخلفية كل 60 ثانية
            setInterval(function() {
                loadMatchesFromYSscores(true);
            }, 60000);
        </script>
    </body>
</html>
