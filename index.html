<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Elwazer TV — بث مباشر</title>
<!-- استدعاء مشغل Clappr الاحترافي المفضل والمستقر لديك -->
<script src="https://cdn.jsdelivr.net/npm/clappr@latest/dist/clappr.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap');
:root {
  --void:#070809;--base:#0e1014;--card:#13161c;--card2:#191d26;
  --border:#1e2330;--border2:#2a3048;
  --red:#e63946;--red-glow:rgba(230,57,70,0.2);
  --gold:#f4a72a;--green:#2ecc71;--blue:#3a7bd5;
  --text:#dde3f0;--text2:#7a8499;--text3:#3d4560;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Tajawal',sans-serif;
  background:var(--void);
  color:var(--text);
  min-height:100vh;
  overflow-x:hidden;
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
}
.page{display:none;min-height:100vh;}
.page.active{display:block;}

/* NAVBAR (تعديل الهيدر ليصبح نظيفاً ومبسطاً بدون حسابات) */
#navbar{background:rgba(7,8,9,.96);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;display:flex;align-items:center;padding:0 28px;height:62px;gap:20px;}
.nav-brand{font-size:22px;font-weight:800;letter-spacing:-.5px;white-space:nowrap;}
.nav-brand span{color:var(--red);}
.nav-tabs{display:flex;gap:4px;flex:1;justify-content:flex-end;}
.nav-tab{padding:7px 18px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;color:var(--text2);transition:all .15s;border:none;background:transparent;font-family:'Tajawal',sans-serif;}
.nav-tab:hover{color:var(--text);background:var(--card);}
.nav-tab.active{color:var(--text);background:var(--card2);}

/* SECTION */
.section-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.section-title{font-size:20px;font-weight:800;letter-spacing:-.3px;}
.section-badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;background:var(--red-glow);color:var(--red);border:1px solid rgba(230,57,70,.3);}
.section-line{flex:1;height:1px;background:var(--border);}

/* DAY TABS */
#tab-matches{padding:28px;}
.day-tabs{display:flex;gap:8px;margin-bottom:24px;overflow-x:auto;padding-bottom:4px;}
.day-tabs::-webkit-scrollbar{display:none;}
.day-btn{flex-shrink:0;padding:8px 18px;border-radius:10px;background:var(--card);border:1px solid var(--border);color:var(--text2);font-family:'Tajawal',sans-serif;font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;}
.day-btn:hover{border-color:var(--border2);color:var(--text);}
.day-btn.active{background:var(--red);border-color:var(--red);color:#fff;box-shadow:0 4px 16px var(--red-glow);}

/* MATCH CARD */
.match-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;margin-bottom:10px;display:flex;align-items:center;gap:16px;cursor:default;transition:all .15s;position:relative;overflow:hidden;}
.match-card::before{content:'';position:absolute;top:0;right:0;bottom:0;width:3px;background:var(--border);transition:all .15s;}
.match-card.has-link{cursor:pointer;}
.match-card.has-link:hover{border-color:var(--border2);background:var(--card2);transform:translateX(-2px);}
.match-card.has-link:hover::before{background:var(--red);}
.match-card.live-now{border-color:rgba(230,57,70,.3);}
.match-card.live-now::before{background:var(--red);}

.match-time{min-width:60px;text-align:center;}
.time-val{font-size:17px;font-weight:800;color:var(--text);}
.live-badge{display:inline-block;background:var(--red);color:#fff;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;letter-spacing:.5px;animation:blink 1.2s infinite;}
.time-val{font-size:16px;font-weight:800;color:var(--text);line-height:1.2;}
.time-ampm{font-size:10px;font-weight:700;color:var(--text2);letter-spacing:.3px;margin-top:1px;}
.status-pill{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:20px;margin-top:4px;letter-spacing:.3px;}
.status-pill.ended  {background:rgba(100,110,130,.15);color:#8892aa;border:1px solid rgba(100,110,130,.25);}
.status-pill.upcoming{background:rgba(58,123,213,.12);color:#5b9ef5;border:1px solid rgba(58,123,213,.25);}
.status-pill.live   {background:rgba(230,57,70,.15);color:var(--red);border:1px solid rgba(230,57,70,.3);}

.match-divider{width:1px;height:44px;background:var(--border);flex-shrink:0;}

.match-teams{flex:1;display:flex;align-items:center;gap:12px;}
.team{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;}
.team-logo{width:44px;height:44px;border-radius:50%;background:var(--base);display:flex;align-items:center;justify-content:center;overflow:hidden;}
.team-logo img{width:100%;height:100%;object-fit:contain;padding:4px;}
.team-name{font-size:13px;font-weight:700;text-align:center;line-height:1.3;}
.vs-block{text-align:center;min-width:56px;}
.vs-score{font-size:22px;font-weight:800;letter-spacing:2px;}
.vs-dash{font-size:18px;color:var(--text3);font-weight:700;}

.match-action{min-width:70px;display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
.btn-watch{background:var(--red);color:#fff;border:none;border-radius:9px;padding:8px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;box-shadow:0 4px 14px var(--red-glow);}
.btn-watch:hover{background:#ff4757;transform:scale(1.04);}

/* MOVIES */
#tab-movies{padding:28px;}
.movies-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:16px;}
.movie-card{background:var(--card);border:1px solid var(--border);border-radius:12px;overflow:hidden;cursor:pointer;transition:all .15s;}
.movie-card:hover{border-color:var(--border2);transform:translateY(-3px);box-shadow:0 12px 32px rgba(0,0,0,.5);}
.movie-poster{width:100%;aspect-ratio:2/3;background:var(--base);display:flex;align-items:center;justify-content:center;font-size:48px;overflow:hidden;position:relative;}
.movie-poster img{width:100%;height:100%;object-fit:cover;}
.movie-quality{position:absolute;top:8px;left:8px;background:var(--gold);color:#000;font-size:9px;font-weight:800;padding:2px 6px;border-radius:4px;}
.movie-info{padding:12px;}
.movie-title{font-size:13px;font-weight:700;margin-bottom:4px;}
.movie-meta{font-size:11px;color:var(--text2);}
.movie-play{display:flex;align-items:center;justify-content:center;gap:6px;background:var(--red);color:#fff;border:none;border-radius:7px;padding:7px;width:100%;margin-top:10px;font-family:'Tajawal',sans-serif;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;}
.movie-play:hover{background:#ff4757;}

/* PLAYER */
#page-player{background:#000;min-height:100vh;display:none;flex-direction:column;}
#page-player.active{display:flex;}
.player-topbar{background:rgba(0,0,0,.9);backdrop-filter:blur(10px);border-bottom:1px solid #1a1a1a;padding:0 24px;height:54px;display:flex;align-items:center;gap:16px;flex-shrink:0;}
.btn-back{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:8px;padding:6px 14px;font-size:13px;font-weight:600;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;}
.btn-back:hover{background:rgba(255,255,255,.14);}
.player-title{font-size:15px;font-weight:700;}
.player-sub{font-size:12px;color:#666;margin-right:auto;}

.player-wrapper-outer {
  flex: 1;
  min-height: 0;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 10px;
  overflow: hidden;
}
.player-wrapper{
  position: relative;
  width: 100%;
  height: 100%;
  max-width: 120vh;
  max-height: calc(100vh - 190px);
  aspect-ratio: 16/9;
  background: #000;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 15px 40px rgba(0,0,0,0.6);
}

/* CLAPPR VIDEOS CONTAINER */
#clappr-player { width: 100%; height: 100%; }
#clappr-player video { object-fit: fill !important; width: 100% !important; height: 100% !important; }

/* IFRAME & CUSTOM EMBED CONTAINER */
#iframe-player {
  width: 100%; height: 100%;
  border: none; background: #000;
  display: none;
}
#custom-player-container {
  width: 100%; height: 100%;
  background: #000;
  display: none;
}
#custom-player-container iframe, 
#custom-player-container embed {
  width: 100% !important; height: 100% !important;
  border: none !important;
}

/* 🎯 اللوجو الأصلي والمثالي المعتمد لديك بالأبعاد والنسب الدقيقة تماماً 🎯 */
.custom-video-logo {
  position: absolute !important;
  top: 0.1% !important;            /* الارتفاع المثالي الذي اعتمدته */
  right: 2.1% !important;          /* الاتجاه الجانبي المثالي الذي اعتمدته */
  z-index: 999999 !important;      /* لضمان الظهور فوق كود المشغل في وضع ملء الشاشة */
  width: 18% !important;           
  aspect-ratio: 1.45 / 1 !important; 
  object-fit: fill !important;     
  pointer-events: none !important;
  background: transparent !important; 
}

/* زر تفعيل الصوت التفاعلي المطور للتغلب على حماية المتصفحات */
.unmute-overlay {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  z-index: 9999999 !important; 
  background: rgba(10, 10, 10, 0.85);
  border: 1px solid rgba(255, 255, 255, 0.15);
  color: #fff;
  padding: 12px 24px;
  border-radius: 30px;
  font-size: 14px;
  font-weight: bold;
  display: none; 
  align-items: center;
  gap: 10px;
  cursor: pointer;
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.5);
  transition: all 0.2s ease;
  animation: pulse 2s infinite;
}
.unmute-overlay:hover {
  background: rgba(46, 13, 94, 0.9);
  border-color: #00ff88;
  transform: translate(-50%, -50%) scale(1.05);
}
.unmute-overlay svg {
  width: 20px;
  height: 20px;
  fill: currentColor;
}

/* لوحة التنبيه الزجاجية الأنيقة في حال كان البث متوقفاً */
.offline-overlay {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: 9999998 !important; 
  background: rgba(10, 10, 10, 0.92);
  display: none; 
  flex-direction: column;
  align-items: center;
  justify-content: center;
  color: #fff;
  text-align: center;
  padding: 20px;
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
}
.offline-overlay svg {
  width: 55px;
  height: 55px;
  fill: #ff3b30; 
  margin-bottom: 15px;
}
.offline-overlay h3 { font-size:16px; margin-bottom:6px; }
.offline-overlay p  { font-size:12px; color:var(--text2); max-width:280px; line-height:1.6; }

@keyframes pulse {
  0% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.4); }
  70% { box-shadow: 0 0 0 10px rgba(0, 255, 136, 0); }
  100% { box-shadow: 0 0 0 0 rgba(0, 255, 136, 0); }
}

@media (max-width: 768px) {
  .custom-video-logo { 
      right: 2.1% !important; 
      top: 0.1% !important; 
      width: 18% !important; 
  }
}

/* LOADING & ERROR SLIDES */
.player-loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:#000;z-index:5;}
.player-loading .spinner-big{width:48px;height:48px;}
.player-loading p{color:#666;font-size:14px;}
.player-error-box{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px;background:#000;z-index:10;}
.player-error-box .err-icon{font-size:48px;}
.player-error-box p{color:#888;font-size:14px;text-align:center;}
.btn-vlc{background:#f60;border:none;color:#fff;border-radius:8px;padding:9px 20px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-top:8px;}

.channel-strip{background:#080808;border-top:1px solid #111;padding:12px 24px;display:flex;gap:10px;overflow-x:auto;flex-shrink:0;}
.channel-strip::-webkit-scrollbar{display:none;}
.strip-ch{flex-shrink:0;padding:7px 16px;border-radius:8px;background:#111;border:1px solid #222;color:#888;font-size:13px;font-weight:600;cursor:pointer;font-family:'Tajawal',sans-serif;transition:all .15s;white-space:nowrap;}
.strip-ch:hover{border-color:#333;color:#ccc;}
.strip-ch.active{background:var(--red);border-color:var(--red);color:#fff;}

/* APP LOADING */
#app-loading{position:fixed;inset:0;background:var(--void);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:999;}
.app-brand{font-size:28px;font-weight:800;}
.app-brand span{color:var(--red);}

/* TOAST */
#toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%);background:var(--card2);border:1px solid var(--border2);color:var(--text);border-radius:10px;padding:12px 20px;font-size:14px;z-index:500;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;}
#toast.show{opacity:1;}

/* تحسينات وتعديلات خاصة بالهواتف و الـ WebViews ليظهر كتطبيق سينمائي حقيقي 🎯 */
@media(max-width:640px){
  #navbar{padding:0 12px;gap:8px;}
  .nav-brand{font-size:19px;}
  .nav-tab{font-size:13px;padding:6px 12px;}
  #tab-matches,#tab-movies{padding:12px;}
  .match-card{padding:12px 14px;gap:10px;}
  .team-logo{width:34px;height:34px;}
  .team-name{font-size:11px;}
  .vs-score{font-size:18px;}
  .match-action{min-width:70px;}
  .btn-watch{padding:6px 12px;font-size:12px;}
  
  /* تعديل التوزيع في الموبايل ليصبح عمودين متجاورين كالتطبيقات الرسمية لشاشات الهواتف 🎯 */
  .movies-grid{
    grid-template-columns:repeat(2, 1fr) !important;
    gap: 10px !important;
  }
}
</style>
</head>
<body>

<!-- APP LOADING (تعديل شعار التحميل للعلامة التجارية الجديدة) -->
<div id="app-loading">
  <div class="app-brand">Elwazer <span>TV</span></div>
  <div class="spinner-big" style="width:36px;height:36px;border-width:2px;margin:0;"></div>
  <p style="color:var(--text2);font-size:14px;" id="loading-msg">جاري تحميل المنصة...</p>
</div>

<div id="toast"></div>

<!-- MAIN -->
<div id="page-main" class="page">
  <nav id="navbar">
    <!-- تعديل شعار الموقع في الهيدر للعلامة التجارية الجديدة -->
    <div class="nav-brand">Elwazer <span>TV</span></div>
    <div class="nav-tabs">
      <button class="nav-tab active" onclick="switchTab('matches',this)">⚽ المباريات</button>
      <button class="nav-tab" onclick="switchTab('movies',this)">🎬 أفلام</button>
    </div>
  </nav>

  <div id="tab-matches">
    <div class="section-header">
      <div class="section-title">جدول المباريات</div>
      <div class="section-badge" id="matches-badge">—</div>
      <div class="section-line"></div>
    </div>
    <div class="day-tabs" id="day-tabs"></div>
    <div id="matches-container">
      <div class="loading-state"><div class="spinner-big"></div><p>جاري تحميل المباريات...</p></div>
    </div>
  </div>

  <div id="tab-movies" style="display:none">
    <div class="section-header">
      <div class="section-title">أفلام مختارة</div>
      <div class="section-line"></div>
    </div>
    <div class="movies-grid" id="movies-grid"></div>
  </div>
</div>

<!-- PLAYER -->
<div id="page-player" class="page">
  <div class="player-topbar">
    <button class="btn-back" onclick="closePlayer()">← رجوع</button>
    <div>
      <div class="player-title" id="player-title">—</div>
      <div class="player-sub" id="player-sub">—</div>
    </div>
    <!-- تم إضافة id هنا للتحكم بإخفاء وإظهار كلمة "بث مباشر" برمجياً حسب نوع المادة 🎯 -->
    <div class="nav-live-dot" id="player-live-indicator"><div class="live-dot"></div>بث مباشر</div>
  </div>
  
  <div class="player-wrapper-outer">
    <div class="player-wrapper" id="player-wrapper">
      
      <!-- حاوية مشغل Clappr المفضل لديك -->
      <div id="clappr-player"></div>
      
      <!-- مشغل الآيفريم لروابط التضمين الخارجية -->
      <iframe id="iframe-player" allowfullscreen></iframe>
      
      <!-- حاوية مخصصة للأكواد البرمجية الكاملة (Iframe كامل أو Embed كامل) -->
      <div id="custom-player-container"></div>

      <!-- اللوجو العائم فوق المشغلات والـ embed بالنسب المحددة لديك تماماً 🎯 -->
      <img src="logo.png" class="custom-video-logo" id="custom-logo" alt="Logo">

      <!-- شاشة مؤشر التحميل التفاعلية -->
      <div class="player-loading" id="player-loading" style="display: none;">
        <div class="spinner-big"></div>
        <p>جاري تحميل البث...</p>
      </div>

      <!-- لوحة التنبيه الزجاجية الأنيقة للبث المتوقف -->
      <div id="offline-overlay" class="offline-overlay">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
          <div class="offline-title">البث متوقف مؤقتاً</div>
          <div class="offline-subtitle">هذه القناة لا تحتوي على بث نشط حالياً. يرجى تجربة القنوات الأخرى أو العودة لاحقاً.</div>
      </div>

      <!-- شاشة تفعيل الصوت التفاعلية -->
      <div id="unmute-overlay" class="unmute-overlay" onclick="unmutePlayer()">
          <svg viewBox="0 0 24 24"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM19 12c0 3.28-2.16 6.07-5.14 7.03c1.92-.61 3.44-2.13 4.05-4.05C18.42 13.93 19 12.82 19 12zm-8.81 7.19L5.35 14H2v-4h3.35l4.84-5.19C10.74 4.26 11.5 4.61 11.5 5.3v13.4c0 .69-.76 1.04-1.31.49z"/></svg>
          اضغط لتفعيل الصوت
      </div>

    </div>
  </div>
  <div class="channel-strip" id="channel-strip"></div>
</div>

<script>
// ══════════════════════════════════════════════════════
//  CONFIG — عدّل هنا فقط
// ══════════════════════════════════════════════════════
const CONFIG = {
  // أفلام — ضع روابطك هنا
  movies: [
    { 
      title:'فيلم فاميلي بيزنس 2026', 
      year:'2026', 
      quality:'HD', 
      emoji:'https://a.asd.ink/wp-content/uploads/2026/06/cEIPRBe6THaUNXWYUBSW2dtqlC4-scaled-367x550.webp', 
      url:'https://amoo.larhu.website/hls/vxzxgs6cqkqfycihmto7zuxgj6bpsbzdfzjy2najr2icmmmadcauc4s4z6wa/index-v1-a1.m3u8', 
      isEmbed: false, 
      genre:'كوميدي' 
    },
    { title:'فيلم 2', year:'2023', quality:'4K', emoji:'🎭', url:'', genre:'دراما'      },
    { title:'فيلم 3', year:'2024', quality:'HD', emoji:'🚀', url:'', genre:'خيال علمي'  },
    { title:'فيلم 4', year:'2023', quality:'HD', emoji:'😂', url:'', genre:'كوميديا'    },
    { title:'فيلم 5', year:'2024', quality:'4K', emoji:'👊', url:'', genre:'أكشن'       },
    { title:'فيلم 6', year:'2022', quality:'HD', emoji:'💀', url:'', genre:'رعب'        },
  ],

  // قنوات البث — ضع روابطك هنا
  channels: [
    { id:'bein1',  name:'beIN Sports 1',  url:'', logo:'📺' },
    { id:'bein2',  name:'beIN Sports 2',  url:'', logo:'📺' },
    { id:'bein3',  name:'beIN Sports 3',  url:'', logo:'📺' },
    { id:'bein4',  name:'beIN Sports 4',  url:'', logo:'📺' },
    { id:'bein5',  name:'beIN Sports 5',  url:'', logo:'📺' },

// ══════════════════════════════════════════════════════
//  FETCH & PARSE ssirtv.com
// ══════════════════════════════════════════════════════
async function loadMatches(dayKey) {
  const container = document.getElementById('matches-container');
  container.innerHTML = `<div class="loading-state"><div class="spinner-big"></div><p>جاري تحميل المباريات...</p></div>`;
  document.getElementById('matches-badge').textContent = '...';

  const srcUrl = CONFIG.sources[dayKey];
  const fetchUrl = CONFIG.proxy + encodeURIComponent(srcUrl);

  try {
    const res = await fetch(fetchUrl);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const html = await res.text();
    const matches = parseMatches(html);
    currentMatches = matches;
    renderMatches(matches);
    document.getElementById('matches-badge').textContent = matches.length + ' مباراة';
  } catch (err) {
    console.error(err);
    container.innerHTML = `
      <div class="empty-state">
        <div style="font-size:40px;margin-bottom:12px;">⚠️</div>
        <div style="font-size:15px;font-weight:700;margin-bottom:8px;">تعذّر تحميل المباريات</div>
        <div style="font-size:13px;color:var(--text3);">تحقق من اتصالك بالإنترنت ثم أعد المحاولة</div>
        <button onclick="loadMatches('${dayKey}')" style="margin-top:16px;background:var(--red);border:none;color:#fff;padding:9px 20px;border-radius:8px;font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;">إعادة المحاولة</button>
      </div>`;
    document.getElementById('matches-badge').textContent = '!';
  }
}

function parseMatches(html) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(html, 'text/html');
  const matches = [];

  const allImgs = [...doc.querySelectorAll('img')].filter(img => {
    const src = img.src || img.getAttribute('src') || '';
    return src.includes('wp-content/uploads') && !src.includes('thumb') && !src.includes('logo');
  });

  for (let i = 0; i + 1 < allImgs.length; i += 2) {
    const img1 = allImgs[i];
    const img2 = allImgs[i + 1];

    const home = img1.getAttribute('alt') || 'فريق 1';
    const away = img2.getAttribute('alt') || 'فريق 2';

    const container = findCommonContainer(img1, img2, doc);
    if (!container) continue;

    const text = container.textContent || '';

    const timeMatch = text.match(/\b(\d{1,2}:\d{2})\b/);
    const time = timeMatch ? timeMatch[1] : '—';

    const scoreMatch = text.match(/\b(\d+)-(\d+)\b/);
    const homeScore = scoreMatch ? scoreMatch[1] : null;
    const awayScore = scoreMatch ? scoreMatch[2] : null;

    const isLive    = text.includes('جارية') || text.includes('مباشر') || text.includes('الآن');
    const isEnded   = text.includes('انتهت') || text.includes('منتهية');
    const notStarted= text.includes('لم تبدأ') || text.includes('لم يبدأ');

    const links = [...container.querySelectorAll('a[href]')];
    const watchLink = links.find(a => {
      const h = a.getAttribute('href') || '';
      return h.includes('ssirtv.com/matches/') || h.includes('hes-goals') || h.includes('korat');
    });
    const watchUrl = watchLink ? (watchLink.getAttribute('href') || '') : '';

    matches.push({
      home, away,
      homeLogo: img1.getAttribute('src') || '',
      awayLogo: img2.getAttribute('src') || '',
      time, homeScore, awayScore,
      isLive, isEnded, notStarted,
      watchUrl
    });
  }

  return matches;
}

function findCommonContainer(img1, img2, doc) {
  let node = img1.parentElement;
  for (let i = 0; i < 8; i++) {
    if (!node) break;
    if (node.contains(img2)) return node;
    node = node.parentElement;
  }
  return doc.body;
}

// ══════════════════════════════════════════════════════
//  RENDER MATCHES
// ══════════════════════════════════════════════════════

function toAmPm(t) {
  if (!t || t === '—') return { display: t, ampm: '' };
  const parts = t.split(':');
  if (parts.length < 2) return { display: t, ampm: '' };
  let h = parseInt(parts[0], 10);
  const m = parts[1];
  const ampm = h >= 12 ? 'PM' : 'AM';
  h = h % 12 || 12;
  return { display: h + ':' + m, ampm };
}

function renderMatches(matches) {
  const container = document.getElementById('matches-container');
  if (matches.length === 0) {
    container.innerHTML = `<div class="empty-state"><div style="font-size:40px;margin-bottom:12px">😴</div><div>لا توجد مباريات في هذا اليوم</div></div>`;
    return;
  }

  container.innerHTML = matches.map((m) => {
    const { display: timeDisplay, ampm } = toAmPm(m.time);
    let timeHtml = '';
    if (m.isLive) {
      timeHtml = `
        <div class="live-badge">LIVE</div>
        <div class="time-ampm" style="margin-top:4px">${timeDisplay} <span style="color:var(--red)">${ampm}</span></div>`;
    } else {
      let pillHtml = '';
      if (m.isEnded)    pillHtml = `<div class="status-pill ended">انتهت</div>`;
      else if (m.notStarted) pillHtml = `<div class="status-pill upcoming">لم تبدأ</div>`;
      timeHtml = `
        <div class="time-val">${timeDisplay}</div>
        <div class="time-ampm">${ampm}</div>
        ${pillHtml}`;
    }

    const scoreHtml = (m.homeScore !== null && m.homeScore !== undefined)
      ? `<div class="vs-score">${m.homeScore} - ${m.awayScore}</div>`
      : `<div class="vs-dash">VS</div>`;

    // تم إضافة referrerpolicy لمنع حجب شعارات الفرق بسبب حماية السيرفرات الخارجية 🎯
    const homeLogo = m.homeLogo
      ? `<img src="${m.homeLogo}" alt="${m.home}" referrerpolicy="no-referrer" onerror="this.style.display='none'">`
      : '🏠';
    const awayLogo = m.awayLogo
      ? `<img src="${m.awayLogo}" alt="${m.away}" referrerpolicy="no-referrer" onerror="this.style.display='none'">`
      : '🚌';

    const matchKey1 = m.home + ' vs ' + m.away;
    const matchKey2 = m.away + ' vs ' + m.home;
    const configUrl = CONFIG.matchLinks[matchKey1] || CONFIG.matchLinks[matchKey2] || '';
    const streamUrl = configUrl || m.watchUrl || '';

    const cardClass = streamUrl
      ? (m.isLive ? 'match-card live-now has-link' : 'match-card has-link')
      : (m.isLive ? 'match-card live-now' : 'match-card');

    const actionHtml = streamUrl
      ? `<button class="btn-watch" onclick="openStream('${encodeURIComponent(streamUrl)}','${encodeURIComponent(matchKey1)}')">▶ شاهد</button>`
      : ``;

    return `
      <div class="${cardClass}" ${streamUrl ? `onclick="openStream('${encodeURIComponent(streamUrl)}','${encodeURIComponent(matchKey1)}')"` : ''}>
        <div class="match-time">${timeHtml}</div>
        <div class="match-divider"></div>
        <div class="match-teams">
          <div class="team">
            <div class="team-logo">${homeLogo}</div>
            <div class="team-name">${m.home}</div>
          </div>
          <div class="vs-block">${scoreHtml}</div>
          <div class="team">
            <div class="team-logo">${awayLogo}</div>
            <div class="team-name">${m.away}</div>
          </div>
        </div>
        <div class="match-action">${actionHtml}</div>
      </div>`;
  }).join('');
}

function openStream(encodedUrl, encodedTitle) {
  const url   = decodeURIComponent(encodedUrl);
  const title = decodeURIComponent(encodedTitle);
  document.getElementById('player-title').textContent = title;
  document.getElementById('player-sub').textContent   = 'بث مباشر';
  document.getElementById('channel-strip').innerHTML  = '';
  
  // إظهار كلمة "بث مباشر" للمباريات والقنوات المباشرة 🎯
  document.getElementById('player-live-indicator').style.display = 'flex';
  
  showPage('player');
  playUrl(url, title);
}

// ══════════════════════════════════════════════════════
//  OPEN MATCH
// ══════════════════════════════════════════════════════
async function openMatchPage(encodedUrl, encodedTitle) {
  const url   = decodeURIComponent(encodedUrl);
  const title = decodeURIComponent(encodedTitle);

  if (url.includes('hes-goals') || url.includes('.m3u8') || url.includes('.mp4')) {
    document.getElementById('player-title').textContent = title;
    document.getElementById('player-sub').textContent   = 'بث مباشر';
    document.getElementById('channel-strip').innerHTML  = buildChannelStrip();
    
    // إظهار كلمة "بث مباشر" للمباريات والقنوات المباشرة 🎯
    document.getElementById('player-live-indicator').style.display = 'flex';
    
    showPage('player');
    playUrl(url, title);
    return;
  }

  toast('🔍 جاري البحث عن البث...');
  try {
    const proxyUrl = CONFIG.proxy + encodeURIComponent(url);
    const res = await fetch(proxyUrl);
    const html = await res.text();

    const streamUrl = extractStreamUrl(html);

    document.getElementById('player-title').textContent = title;
    document.getElementById('player-sub').textContent   = 'بث مباشر';
    document.getElementById('channel-strip').innerHTML  = buildChannelStrip();
    
    // إظهار كلمة "بث مباشر" للمباريات والقنوات المباشرة 🎯
    document.getElementById('player-live-indicator').style.display = 'flex';
    
    showPage('player');

    if (streamUrl) {
      playUrl(streamUrl, title);
    } else {
      document.getElementById('player-loading').style.display = 'none';
      document.getElementById('player-error-box').style.display = 'flex';
      document.getElementById('player-error-box').querySelector('p').innerHTML =
        'لم يتم العثور على رابط البث تلقائياً<br><span style="font-size:12px;color:#555">اختر قناة من الشريط أدناه</span>';
    }
  } catch(e) {
    document.getElementById('player-title').textContent = title;
    showPage('player');
    document.getElementById('player-loading').style.display = 'none';
    document.getElementById('player-error-box').style.display = 'flex';
    document.getElementById('channel-strip').innerHTML = buildChannelStrip();
  }
}

function extractStreamUrl(html) {
  const patterns = [
    /(?:src|source|file|url)\s*[:=]\s*["']([^"']+\.m3u8[^"']*)/gi,
    /["'](https?:\/\/[^"']+\.m3u8[^"']*)/gi,
    /["'](https?:\/\/[^"']+\/hls\/[^"']+)/gi,
    /(?:src|source|file|url)\s*[:=]\s*["']([^"']+\.mp4[^"']*)/gi,
  ];
  for (const rx of patterns) {
    const m = rx.exec(html);
    if (m && m[1] && m[1].startsWith('http')) return m[1];
  }
  return null;
}

function buildChannelStrip() {
  return CONFIG.channels.filter(c => c.url).map(c =>
    `<button class="strip-ch" onclick="switchChannel('${c.id}',this)">${c.logo} ${c.name}</button>`
  ).join('') || '<span style="color:#555;font-size:13px;align-self:center;">أضف روابط القنوات في CONFIG لتظهر هنا</span>';
}

function switchChannel(id, btn) {
  document.querySelectorAll('.strip-ch').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const ch = CONFIG.channels.find(c => c.id === id);
  if (ch?.url) { document.getElementById('player-sub').textContent = ch.name; playUrl(ch.url, ch.name); }
  else toast('الرابط غير محدد لهذه القناة');
}

function playMovie(i) {

  if (!m.url) { toast('⚠️ ضع رابط الفيلم في CONFIG.movies'); return; }
  document.getElementById('player-title').textContent = m.title;
  document.getElementById('player-sub').textContent   = m.quality + ' · ' + m.genre;
  document.getElementById('channel-strip').innerHTML  = '';
  
  // إخفاء كلمة "بث مباشر" للأفلام 🎯
  document.getElementById('player-live-indicator').style.display = 'none';
  
  showPage('player');
  playUrl(m.url, m.title, m.isEmbed);
}

// ══════════════════════════════════════════════════════
//  PLAYER (نظام تشغيل ذكي وخفيف فائق السرعة كـ Clappr المفضل لديك)
// ══════════════════════════════════════════════════════
async function playUrl(url, label, isEmbed = false) {
  currentStreamUrl = url;
  const clapprContainer = document.getElementById('clappr-player');
  const iframe   = document.getElementById('iframe-player');
  const customContainer = document.getElementById('custom-player-container');
  const loading  = document.getElementById('player-loading');
  const errorBox = document.getElementById('player-error-box');
  const offEl    = document.getElementById('offline-overlay');
  const unmEl    = document.getElementById('unmute-overlay');

  loading.style.display  = 'flex';
  errorBox.style.display = 'none';
  offEl.style.display    = 'none';
  unmEl.style.display    = 'none';
  
  // تفريغ أي بث سابق لتجنب التداخل وتدمير مشغل Clappr النشط بأمان
  if (clapprInstance) {
    try { clapprInstance.destroy(); } catch(e){}
    clapprInstance = null;
  }
  iframe.src = '';
  customContainer.innerHTML = '';

  // إخفاء كافة المشغلات مؤقتاً
  clapprContainer.style.display = 'none';
  iframe.style.display  = 'none';
  customContainer.style.display = 'none';

  const trimmed = url.trim();

  // 1. فحص تشغيل الأكواد الكاملة المباشرة (مثل كود iframe كامل أو embed)
  if (trimmed.startsWith('<')) {
    customContainer.style.display = 'block';
    customContainer.innerHTML = trimmed;
    injectOverlaysCustom(); // ترحيل اللوجو فوق التضمين المباشر
    loading.style.display = 'none';
    return;
  }

  // 2. فحص روابط التضمين العادية (Embed Links) أو خيار isEmbed
  const isDirectStream = url.includes('.m3u8') || url.includes('.mp4') || url.includes('/hls/');
  if (isEmbed || !isDirectStream) {
    iframe.style.display = 'block';
    iframe.src = url;
    iframe.onload = () => {
      loading.style.display = 'none';
    };
    return;
  }

  // 3. تشغيل ملفات الـ m3u8 و الـ mp4 الأساسية بالاعتماد الكلي على مشغل Clappr المفضل والمستقر للغاية 🎯
  clapprContainer.style.display = 'block';

  clapprInstance = new Clappr.Player({
      source: url, 
      parentId: '#clappr-player',
      width: '100%',
      height: '100%',
      autoPlay: true,
      mute: true, // تخطي كتم الصوت الإجباري من المتصفحات
      preload: 'auto',
      playback: {
          playInline: true,
          recycleVideo: true,
          hlsMinimumjsversion: '0.12.0',
          hlsjsConfig: {
              enableWorker: true,
              lowLatencyMode: true,
              maxBufferLength: 12,
              liveBackBufferLength: 0,
              manifestLoadingMaxRetry: 10,
              levelLoadingMaxRetry: 10,
              // دمج نظام اعتراض وفك حظر CORS ديناميكياً بداخل Clappr لتشغيل أي سيرفر محمي 🎯
              xhrSetup: function(xhr, targetUrl) {
                if (!targetUrl.startsWith(CONFIG.proxy) && (targetUrl.includes('vood') || targetUrl.includes('boutique') || targetUrl.includes('asd.ink'))) {
                  const proxiedUrl = CONFIG.proxy + encodeURIComponent(targetUrl);
                  xhr.open('GET', proxiedUrl, true);
                }
              }
          }
      }
  });

  clapprInstance.on(Clappr.Events.PLAYER_READY, function() {
      loading.style.display = 'none';
      injectOverlays(); // تفعيل لصق اللوجو العائم والتراكبات بداخل حاوية Clappr لضمان ظهوره بالكامل بملء الشاشة 🎯

      if (!url || url === '#') {
          clapprInstance.pause();
          offEl.style.display = 'flex';
          unmEl.style.display = 'none';
      } else {
          clapprInstance.unmute();
          setTimeout(function() {
              var volumePlugin = clapprInstance.getPlugin('volume');
              if (clapprInstance.getVolume() === 0 || (volumePlugin && volumePlugin.$el.hasClass('muted'))) {
                  unmEl.style.display = 'flex';
              }
          }, 600);
      }
  });

  // إعادة التثبيت والحقن عند التبديل أو إعادة تجميع الحاوية
  clapprInstance.on(Clappr.Events.CORE_CONTAINERS_CREATED, injectOverlays);

  clapprInstance.on(Clappr.Events.PLAYER_PLAY, function() {
      offEl.style.display = 'none';
  });

  // معالجة الأخطاء ونظام الإنعاش التلقائي لـ Clappr عند حدوث تذبذب بالسيرفرات 🎯
  clapprInstance.on(Clappr.Events.PLAYER_ERROR, function(error) {
      console.log('حدث تذبذب في السيرفر، جاري تفعيل نظام الإنعاش التلقائي...');
      loading.style.display = 'none';
      
      offEl.querySelector('.offline-title').innerText = "جاري إعادة الاتصال بالبث...";
      offEl.style.display = 'flex';
      unmEl.style.display = 'none';

      setTimeout(function() {
          if (currentStreamUrl && currentStreamUrl !== '#' && clapprInstance) {
              clapprInstance.load(currentStreamUrl);
              clapprInstance.play();
          }
      }, 5000); 
  });
}

// دالة آمنة لحقن اللوجو المستقل والطبقات بداخل حاوية Clappr التي تتمدد بملء الشاشة 🎯
function injectOverlays() {
    if (clapprInstance && clapprInstance.core && clapprInstance.core.el) {
        var clapprContainer = clapprInstance.core.el; 
        
        var logo = document.getElementById('custom-logo');
        var unmute = document.getElementById('unmute-overlay');
        var offline = document.getElementById('offline-overlay');
        var loading = document.getElementById('player-loading');
        
        if (logo && logo.parentElement !== clapprContainer) {
            clapprContainer.appendChild(logo);
        }
        if (unmute && unmute.parentElement !== clapprContainer) {
            clapprContainer.appendChild(unmute);
        }
        if (offline && offline.parentElement !== clapprContainer) {
            clapprContainer.appendChild(offline);
        }
        if (loading && loading.parentElement !== clapprContainer) {
            clapprContainer.appendChild(loading);
        }
    }
}

// إعادة توجيه وتثبيت اللوجو داخل الإطار المساعد عند الخروج من Clappr
function injectOverlaysCustom() {
    const wrapper = document.getElementById('player-wrapper');
    ['custom-logo','unmute-overlay','offline-overlay','player-loading'].forEach(function(id) {
        var el = document.getElementById(id);
        if (el && el.parentElement !== wrapper) wrapper.appendChild(el);
    });
}

// وظيفة إلغاء كتم الصوت التفاعلي للمتصفحات
function unmutePlayer() {
    if (clapprInstance) {
        clapprInstance.unmute();
        clapprInstance.setVolume(100);
    }
    document.getElementById('unmute-overlay').style.display = 'none';
}

document.body.addEventListener('click', function() {
    if (document.getElementById('unmute-overlay').style.display === 'flex') unmutePlayer();
}, { once: true });

function showPlayerError(msg) {
  document.getElementById('clappr-player').style.display = 'none';
  document.getElementById('iframe-player').style.display = 'none';
  document.getElementById('custom-player-container').style.display = 'none';
  document.getElementById('player-error-box').style.display = 'flex';
  document.getElementById('player-error-msg').textContent = msg || 'تعذّر تشغيل البث';
}

function closePlayer() {
  if (clapprInstance) {
    try { clapprInstance.destroy(); } catch(e){}
    clapprInstance = null;
  }
  const iframe = document.getElementById('iframe-player');
  const customContainer = document.getElementById('custom-player-container');
  
  iframe.src = ''; iframe.style.display = 'none';
  customContainer.innerHTML = ''; customContainer.style.display = 'none';
  
  document.getElementById('offline-overlay').style.display = 'none';
  document.getElementById('unmute-overlay').style.display  = 'none';
  document.getElementById('player-error-box').style.display = 'none';
  document.getElementById('player-loading').style.display   = 'flex';
  showPage('main');
}

function openVLC() {
  if (currentStreamUrl) {
    if (currentStreamUrl.trim().startsWith('<')) {
      toast('⚠️ لا يمكن فتح كود التضمين في VLC مباشرة');
    } else {
      window.location.href = 'vlc://' + currentStreamUrl;
    }
  }
}
</script>
